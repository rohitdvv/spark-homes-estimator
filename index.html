<style>
  :root { --spark: #d05000; }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: contain; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f1f3f6;
    color: #0f0f10;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  /* Smooth accordion */
  .acc { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .32s cubic-bezier(.4,0,.2,1); }
  .acc.open { grid-template-rows: 1fr; }
  .acc > .acc-inner { overflow: hidden; }
  /* Tab views fade/slide */
  .view { animation: viewIn .28s cubic-bezier(.16,1,.3,1); }
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  /* Modal */
  .sheet-back { animation: fade .2s ease; }
  .sheet { animation: sheetUp .34s cubic-bezier(.16,1,.3,1); }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
  .pop { animation: pop .26s cubic-bezier(.16,1,.3,1); }
  @keyframes pop { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  /* Pressable feedback */
  .press { transition: transform .12s ease, background-color .15s ease; }
  .press:active { transform: scale(.96); }
  .checked-glow { box-shadow: 0 0 0 1.5px var(--spark) inset; }
  /* total number flip */
  .total-bump { animation: bump .35s cubic-bezier(.16,1,.3,1); }
  @keyframes bump { 0% { transform: scale(1); } 40% { transform: scale(1.06); color: var(--spark); } 100% { transform: scale(1); } }
  /* progress bar fill */
  .pfill { transition: width .5s cubic-bezier(.16,1,.3,1); }
  /* hide scrollbar on tab strip */
  .noscroll::-webkit-scrollbar { display: none; }
  .noscroll { -ms-overflow-style: none; scrollbar-width: none; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .toast { animation: toastIn .3s cubic-bezier(.16,1,.3,1); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
  @media (prefers-reduced-motion: reduce) {
    *, .view, .sheet, .pop, .acc { animation: none !important; transition: none !important; }
  }
</style>

/* ---------- 2. GROUP CATALOG (every price-list item is placed) ---------- */

/* ---------- 3. ROOM TYPES ---------- */
const ROOM_TYPES = {
  interior: { label: 'Interior / General', section: 'Interior / General', icon: '🏠', single: true,  groups: ['flooring','paint','doors','pest','lighting','general'] },
  systems:  { label: 'Systems & Structure',section: 'Systems & Structure',icon: '⚙️', single: true,  groups: ['hvac','plumbing','electrical','structural','insulation'] },
  exterior: { label: 'Exterior',           section: 'Exterior',           icon: '🌳', single: true,  groups: ['fence','siding','windows','garage','trees','extmisc'] },
  kitchen:  { label: 'Kitchen',            section: 'Kitchen',            icon: '🍳', single: false, groups: ['cabinets','kcounters','appliances'] },
  bathroom: { label: 'Bathroom',           section: 'Bathrooms',          icon: '🛁', single: false, groups: ['vanity','tub','btile'] },
  bedroom:  { label: 'Bedroom',            section: 'Interior / General', icon: '🛏️', single: false, groups: ['flooring','paint','doors','closet'] },
  living:   { label: 'Living / Common',    section: 'Interior / General', icon: '🛋️', single: false, groups: ['flooring','paint','doors','lighting'] }
};
const ADDABLE = ['bathroom','bedroom','living','kitchen','interior','systems','exterior'];

/* ---------- 4. STORAGE ---------- */
const LS = {
  projects: 'spark_projects_v1',
  current:  'spark_current_v1',
  global:   'spark_global_v1'   // { prices:{}, custom:[], deleted:[] }
};
const j = (k, fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
const setLS = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch { return false; } };

let GLOBAL = j(LS.global, { prices: {}, custom: [], deleted: [] });
function saveGlobal() { setLS(LS.global, GLOBAL); }

/* effective catalog = price list + custom items, minus deleted */
function catalog() {
  return [...PRICE_LIST, ...GLOBAL.custom].filter(it => !GLOBAL.deleted.includes(it.id));
}
function itemById(id) { return catalog().find(i => i.id === id); }
function groupItemIds(gid) {
  const base = (GROUPS[gid]?.ids || []).filter(id => !GLOBAL.deleted.includes(id));
  const extra = GLOBAL.custom.filter(c => c.groupId === gid).map(c => c.id);
  return [...base, ...extra];
}
/* price resolution: project override -> global override -> list default */
function priceOf(id) {
  if (P && P.priceOverrides[id] != null) return P.priceOverrides[id];
  if (GLOBAL.prices[id] != null) return GLOBAL.prices[id];
  const it = itemById(id); return it ? it.cost : 0;
}

/* ---------- 5. PROJECT STATE ---------- */
let projects = j(LS.projects, []);
let P = null;        // active project object
const UI = { tab: 'estimate', roomId: null, openGroups: {} , busy:false};

function blankProject(name) {
  const p = {
    id: 'p' + Date.now().toString(36),
    name: name || 'New Estimate',
    address: '',
    createdAt: new Date().toISOString(),
    savedAt: new Date().toISOString(),
    rooms: [],
    cells: {},          // "roomId|groupId|itemId" -> {q}
    nan: {},            // "roomId|groupId" -> true
    priceOverrides: {}, // itemId -> cost (per project)
    photos: [],         // {id,data,caption,serial}
    deal: { arv: '', purchase: '', weeks: 8, perWeek: 350, sellPct: 8 }
  };
  // sensible defaults: the house-wide singletons + 1 kitchen + 1 bath
  ['interior','systems','exterior','kitchen'].forEach(t => addRoom(p, t, true));
  addRoom(p, 'bathroom', true);
  return p;
}
function addRoom(p, type, silent) {
  const t = ROOM_TYPES[type];
  if (t.single && p.rooms.some(r => r.type === type)) { if(!silent) toast(t.label + ' already added'); return; }
  const count = p.rooms.filter(r => r.type === type).length;
  const name = t.single ? t.label : `${t.label} ${count + 1}`;
  const room = { id: 'r' + Math.random().toString(36).slice(2, 8), type, name };
  p.rooms.push(room);
  if (!silent) { UI.roomId = room.id; save(); toast(name + ' added'); render(); }
  return room;
}
function removeRoom(roomId) {
  P.rooms = P.rooms.filter(r => r.id !== roomId);
  Object.keys(P.cells).forEach(k => { if (k.startsWith(roomId + '|')) delete P.cells[k]; });
  Object.keys(P.nan).forEach(k => { if (k.startsWith(roomId + '|')) delete P.nan[k]; });
  if (UI.roomId === roomId) UI.roomId = P.rooms[0]?.id || null;
  save(); render();
}

const cellKey = (r, g, i) => `${r}|${g}|${i}`;
const nanKey  = (r, g) => `${r}|${g}`;

function save() {
  if (!P) return;
  P.savedAt = new Date().toISOString();
  const idx = projects.findIndex(x => x.id === P.id);
  if (idx >= 0) projects[idx] = P; else projects.unshift(P);
  const ok = setLS(LS.projects, projects);
  if (!ok) {
    // quota: retry stripping photo blobs of *other* projects
    const slim = projects.map(p => p.id === P.id ? p : { ...p, photos: [] });
    setLS(LS.projects, slim);
  }
  setLS(LS.current, P.id);
}
function openProject(id) {
  P = projects.find(p => p.id === id);
  if (!P) return;
  UI.roomId = P.rooms[0]?.id || null;
  UI.tab = 'estimate';
  setLS(LS.current, id);
  render();
}

/* ---------- 6. CALC ---------- */
function lineTotal(roomId, gid, id) {
  const c = P.cells[cellKey(roomId, gid, id)];
  if (!c) return 0;
  return (c.q || 0) * priceOf(id);
}
function groupTotal(roomId, gid) {
  return groupItemIds(gid).reduce((s, id) => s + lineTotal(roomId, gid, id), 0);
}
function roomTotal(roomId) {
  const r = P.rooms.find(x => x.id === roomId); if (!r) return 0;
  return ROOM_TYPES[r.type].groups.reduce((s, g) => s + groupTotal(roomId, g), 0);
}
function grandTotal() { return P.rooms.reduce((s, r) => s + roomTotal(r.id), 0); }

function isChecked(roomId, gid, id) { const c = P.cells[cellKey(roomId, gid, id)]; return !!(c && c.q != null); }
function groupChecked(roomId, gid) { return groupItemIds(gid).filter(id => isChecked(roomId, gid, id)).length; }
function groupComplete(roomId, gid) { return !!P.nan[nanKey(roomId, gid)] || groupChecked(roomId, gid) > 0; }

function progress() {
  let total = 0, done = 0;
  P.rooms.forEach(r => ROOM_TYPES[r.type].groups.forEach(g => { total++; if (groupComplete(r.id, g)) done++; }));
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

/* ---------- 7. FORMAT ---------- */
const fmt  = n => '$' + Math.round(n).toLocaleString('en-US');
const fmt2 = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc  = s => String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

}

/* ---- Deal Analyzer (creative addition) ---- */
function viewDeal() {
  const d = P.deal; const repairs = grandTotal();
  const arv = +d.arv || 0, purchase = +d.purchase || 0;
  const holding = (+d.weeks || 0) * (+d.perWeek || 0);
  const selling = arv * ((+d.sellPct || 0) / 100);
  const totalCost = purchase + repairs + holding + selling;
  const profit = arv - totalCost;
  const roi = totalCost > 0 ? (profit / totalCost * 100) : 0;
  const mao = arv * 0.7 - repairs; // 70% rule max allowable offer
  let verdict, vc, vmsg;
  if (!arv || !purchase) { verdict='Enter numbers'; vc='bg-gray-100 text-gray-500'; vmsg='Add ARV and purchase price to analyze the deal.'; }
  else if (profit >= 25000 && roi >= 15) { verdict='GO'; vc='bg-green-100 text-green-700'; vmsg='Healthy margin. Numbers support an offer.'; }
  else if (profit > 0) { verdict='CAUTION'; vc='bg-amber-100 text-amber-700'; vmsg='Thin margin — recheck repairs and holding time.'; }
  else { verdict='NO-GO'; vc='bg-red-100 text-red-700'; vmsg='Projected loss at this price. Offer lower or walk.'; }

  const row = (l, v, sub) => `<div class="flex justify-between items-baseline py-2 border-b border-gray-100"><span class="text-gray-500 text-[13px]">${l}${sub?`<span class="block text-[10px] text-gray-300">${sub}</span>`:''}</span><span class="font-semibold">${v}</span></div>`;
  const inp = (k, ph, pre) => `<div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">${pre||''}</span><input data-act="deal" data-k="${k}" value="${esc(d[k])}" placeholder="${ph}" inputmode="decimal" class="w-full ${pre?'pl-7':'pl-3'} pr-3 py-2.5 rounded-xl border border-gray-200 font-semibold outline-none focus:border-spark" /></div>`;

  return `
  <div class="view px-4 py-4 space-y-4">
    <div>
      <h2 class="font-bold text-lg flex items-center gap-2">📊 Deal Analyzer</h2>
      <p class="text-[12px] text-gray-400">Live profit projection from your live repair estimate.</p>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">After-Repair Value (ARV)</label>${inp('arv','280,000','$')}</div>
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Purchase Price</label>${inp('purchase','150,000','$')}</div>
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Hold Time (weeks)</label>${inp('weeks','8')}</div>
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Holding $/week</label>${inp('perWeek','350','$')}</div>
      <div class="col-span-2"><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Selling Costs (% of ARV)</label>${inp('sellPct','8','%')}</div>
    </div>

    <div class="rounded-2xl ${vc} p-4 pop">
      <div class="flex items-center justify-between">
        <span class="font-extrabold text-2xl tracking-tight">${verdict}</span>
        ${arv&&purchase?`<div class="text-right"><div class="text-[11px] font-semibold opacity-70">Projected Profit</div><div class="font-extrabold text-2xl">${fmt(profit)}</div></div>`:''}
      </div>
      <p class="text-[12px] mt-1 font-medium opacity-90">${vmsg}</p>
    </div>

    <div class="bg-white rounded-2xl p-4 shadow-sm">
      ${row('Repair estimate', fmt(repairs), 'live from this walkthrough')}
      ${row('Purchase price', fmt(purchase))}
      ${row('Holding costs', fmt(holding), `${d.weeks||0} wk × ${fmt2(+d.perWeek||0)}`)}
      ${row('Selling costs', fmt(selling), `${d.sellPct||0}% of ARV`)}
      ${row('Total cost basis', fmt(totalCost))}
      <div class="flex justify-between items-baseline pt-3"><span class="font-bold">Return on cost</span><span class="font-extrabold ${roi>=15?'text-green-600':roi>0?'text-amber-600':'text-red-500'}">${roi.toFixed(1)}%</span></div>
    </div>

    <div class="bg-ink text-white rounded-2xl p-4">
      <div class="flex justify-between items-center">
        <div><div class="text-[11px] text-gray-400 font-semibold">70% RULE — Max Allowable Offer</div><div class="text-[10px] text-gray-500">ARV × 70% − repairs</div></div>
        <div class="font-extrabold text-2xl text-spark-500">${fmt(mao)}</div>
      </div>
    </div>
  </div>`;
}

/* Embedded knowledge base (repair guidelines) — the corpus for RAG-lite */
const KB = [
  { k:['hvac','furnace','heat','ac','condenser','duct'], a:'HVAC is a top hidden cost. A furnace runs ~$3,350, condensing unit ~$3,300, full package unit ~$4,700. Always photograph the data plate for the serial/model, and add duct cleaning when replacing equipment.' },
  { k:['foundation','structural','pier','settle','crack'], a:'Foundation work swings estimates by thousands. Piers run ~$375 each; foam injection ~$5.85/sqft of affected area. Never skip a structural walk — check for sloping floors and stair-step cracks.' },
  { k:['electrical','rewire','panel','aluminum','wiring'], a:'A full rewire to studs is ~$5.65/sqft; leaving drywall ~$9.15/sqft. Aluminum wiring (~$2,450) is a safety + insurability flag. A 200A panel swap is ~$2,350. Rewires almost always trigger new drywall.' },
  { k:['roof','shingle','leak'], a:'Roof is ~$1,100 per 225 sqft (labor & materials). Check for active leaks and decking damage before pricing.' },
  { k:['kitchen','cabinet','counter','granite','appliance'], a:'Cabinets and appliances are the kitchen cost drivers. Cabinet labor & paint ~$1,100; granite + splash ~$40/LF. If you replace cabinets, you usually re-do countertops.' },
  { k:['bathroom','tub','shower','tile','vanity','reglaze'], a:'Decide reglaze vs tear-out early: reglaze tub+surround ~$750 vs a tiled shower tear-out + install ~$3,100. A tub tear-out usually means new tile too. Don\'t price both reglaze and tear-out on the same fixture.' },
  { k:['flooring','floor','carpet','vinyl','hardwood','lvp'], a:'Vinyl plank ~$2.50/sqft, carpet ~$1.90/sqft, refinish hardwood ~$2.35/sqft. New flooring usually needs trim-out (casing/baseboard) afterward.' },
  { k:['arv','profit','margin','70','rule','offer','deal'], a:'Use the 70% rule as a sanity check: Max Allowable Offer = ARV × 0.70 − repairs. The Deal tab computes live profit, ROI, and a GO/CAUTION/NO-GO verdict from your running estimate.' },
  { k:['exterior','siding','paint','fence','curb'], a:'Exterior drives curb appeal and sale price — it\'s evaluated first. Vinyl siding ~$300/square; exterior paint ~$2.60/sqft. New siding usually pairs with exterior paint.' },
  { k:['photo','serial','model','evidence','camera','video'], a:'Photograph serial/model plates on HVAC, water heaters, and appliances. Use Live Capture to grab frames from a video walkthrough, then run "Scan serial #" to OCR the plate on-device.' },

];

function firstRoom(type){ return P.rooms.find(r => r.type === type); }

/* ---- Agent: Inspection Coverage (intake + completeness validation) ---- */
function agentCoverage(){
  const f = [];
  const pr = progress();
  if (P.rooms.length === 0) f.push({ sev:'high', msg:'No rooms added yet — add the rooms in this house to begin.' });
  if (pr.total && pr.done < pr.total) f.push({ sev:'med', msg:`${pr.total - pr.done} of ${pr.total} groups still unreviewed. Mark each "No Action Needed" or add items so nothing is skipped.` });
  // big-ticket guard
  const sys = firstRoom('systems');
  if (sys){
    const big = [['hvac','HVAC / furnace'],['electrical','Electrical'],['structural','Structural / foundation'],['plumbing','Plumbing / water heater']];
    const missed = big.filter(([g]) => !groupComplete(sys.id, g)).map(([,l]) => l);
    if (missed.length) f.push({ sev:'high', msg:`Big-ticket items not yet reviewed: ${missed.join(', ')}. These swing estimates by thousands — never miss them.` });
  } else {
    f.push({ sev:'high', msg:'No "Systems & Structure" room — the hidden costs (HVAC, foundation, rewire) live here. Add it.' });
  }
  if (!(+P.deal.arv) || !(+P.deal.purchase)) f.push({ sev:'low', msg:'Deal inputs incomplete — add ARV and purchase price on the Deal tab for a profit verdict.' });
  if (f.length === 0) f.push({ sev:'ok', msg:'Full coverage — every group reviewed and big-ticket systems checked. Solid walkthrough.' });
  return f;
}

/* ---- Agent: Recommendations (related / commonly-paired items) ---- */
function agentRecommend(){
  const recs = [];
  const has = (rid,gid,id) => isChecked(rid,gid,id);
  const anySelection = Object.keys(P.cells).length > 0;
  const interior = firstRoom('interior'), sys = firstRoom('systems'), ext = firstRoom('exterior'), kit = firstRoom('kitchen');
  const add = (cond, target, title, why) => { if (cond && itemById(target.id) && !isChecked(target.rid,target.gid,target.id)) recs.push({ target, title, why }); };

  // new flooring anywhere -> trim out (interior/general)
  const floorIds = ['ig-01','ig-02','ig-03','ig-04','ig-05','ig-06'];
  const anyFloor = P.rooms.some(r => ROOM_TYPES[r.type].groups.includes('flooring') && floorIds.some(id => has(r.id,'flooring',id)));
  if (interior) add(anyFloor, {rid:interior.id,gid:'general',id:'ig-19'}, 'Add Trim-Out', 'New flooring almost always needs casing/baseboard re-installed.');

  if (sys){
    add(has(sys.id,'hvac','as-01'), {rid:sys.id,gid:'hvac',id:'as-06'}, 'Add Duct Cleaning', 'Replacing the furnace? Clean the ducts while the system is open.');
    const rewire = has(sys.id,'electrical','as-19') || has(sys.id,'electrical','as-20');
    add(rewire, {rid:sys.id,gid:'insulation',id:'as-23'}, 'Add New Drywall', 'A rewire to studs means drywall has to go back up.');
  }
  if (kit){
    const cab = ['kt-02','kt-03','kt-05'].some(id => has(kit.id,'cabinets',id));
    add(cab, {rid:kit.id,gid:'kcounters',id:'kt-06'}, 'Add Countertops', 'New cabinets usually pair with new countertops.');
  }
  if (ext) add(has(ext.id,'siding','ex-05'), {rid:ext.id,gid:'siding',id:'ex-07'}, 'Add Exterior Paint', 'New siding sections need to be painted to match.');

  // per-bathroom: tub tear-out without tile
  P.rooms.filter(r => r.type === 'bathroom').forEach(b => {
    const tearout = ['ba-10','ba-11','ba-13'].some(id => has(b.id,'tub',id));
    const tile = ['ba-05','ba-06'].some(id => has(b.id,'btile',id));
    if (tearout && !tile && itemById('ba-05')) recs.push({ target:{rid:b.id,gid:'btile',id:'ba-05'}, title:`Add Tile — ${b.name}`, why:'A tub/shower tear-out exposes the wall — budget tile.' });
  });

  // whole-house close-out
  if (interior && anySelection){
    add(true, {rid:interior.id,gid:'general',id:'ig-26'}, 'Add Haul-Off', 'Any demo/replacement generates debris that has to be hauled.');
    add(true, {rid:interior.id,gid:'general',id:'ig-27'}, 'Add Final Cleaning', 'Every flip needs a final clean before listing.');
  }
  return recs;
}

/* ---- Agent: Anomaly / risk detection (fraud-style outlier checks) ---- */
function agentAnomaly(){
  const flags = [];
  // quantity outliers
  Object.entries(P.cells).forEach(([k,c]) => {
    const [rid,gid,id] = k.split('|'); const it = itemById(id); if (!it) return;
    const u = it.unit.toLowerCase();
    const big = (/sqft|sf|lf|square/.test(u) && c.q > 5000) || (/ea\.|pier|tree|pane|door|handle|load|stump/.test(u) && c.q > 25);
    if (big) flags.push({ sev:'med', msg:`Unusual quantity: ${it.name} = ${c.q} ${it.unit}. Double-check before the offer.` });
  });
  // extreme price overrides
  const allOv = { ...GLOBAL.prices, ...P.priceOverrides };
  Object.entries(allOv).forEach(([id,v]) => {
    const it = PRICE_LIST.find(x => x.id === id); if (!it || !it.cost) return;
    const ratio = v / it.cost;
    if (ratio > 2.5 || ratio < 0.4) flags.push({ sev:'med', msg:`Price for "${it.name}" is ${ratio.toFixed(1)}× the list default (${fmt2(it.cost)} → ${fmt2(v)}). Confirm it's intentional.` });
  });
  // conflicting bathroom scope
  P.rooms.filter(r => r.type === 'bathroom').forEach(b => {
    const reglaze = ['ba-07','ba-08','ba-09'].some(id => isChecked(b.id,'tub',id));
    const tearout = ['ba-10','ba-11','ba-13'].some(id => isChecked(b.id,'tub',id));
    if (reglaze && tearout) flags.push({ sev:'high', msg:`${b.name}: both a reglaze and a tear-out are selected on the tub/shower — that's double-counting. Pick one.` });
  });
  // deal/estimate mismatch
  if ((+P.deal.arv) && grandTotal() === 0) flags.push({ sev:'low', msg:'Deal has an ARV but the repair estimate is $0 — the profit number is not yet trustworthy.' });
  if (flags.length === 0) flags.push({ sev:'ok', msg:'No anomalies detected. Quantities and pricing look reasonable.' });
  return flags;
}

/* ---- RAG-lite assistant: retrieve best KB answer + live estimate facts ---- */
function assistantAnswer(qRaw){
  const q = qRaw.toLowerCase().trim();
  const pr = progress();

  // greetings / pleasantries — don't let these fall through to a canned scan
  if (/^(hi|hey+|hello|yo|sup|howdy|good (morning|afternoon|evening))\b/.test(q) || /^(thanks|thank you|ty|thx|cool|nice|ok|okay)\b/.test(q))
    return 'Hey! Ask me about the running total, your biggest cost, what\'s left to review, the deal math, or any repair area — HVAC, roof, foundation, electrical, kitchen, bath, flooring, exterior.';

  // running total / cost so far
  if (/\btotal\b|how much|cost so far|running (estimate|total)|what.?s the (estimate|total)/.test(q))
    return `The running repair estimate is ${fmt(grandTotal())} across ${P.rooms.length} rooms (${pr.done}/${pr.total} groups reviewed).`;

  // what's missing / next  (tightened: no greedy "what.*do" that swallows off-topic questions)
  if (/missing|what.?s left|what.?s next|incomplete|remaining|still (need|to do|to review)|to review|haven.?t (done|reviewed|checked)|what should i (review|check|do) next/.test(q)){
    const cov = agentCoverage().filter(f => f.sev !== 'ok');
    return cov.length ? 'Coverage check: ' + cov.map(f => f.msg).join(' ') : 'You\'ve reviewed every group — nothing outstanding.';
  }

  // biggest cost driver
  if (/biggest|most expensive|driver|largest|priciest|top cost|costs? the most/.test(q)){
    let best = null;
    P.rooms.forEach(r => ROOM_TYPES[r.type].groups.forEach(g => groupItemIds(g).forEach(id => {
      const lt = lineTotal(r.id,g,id); if (lt > 0 && (!best || lt > best.lt)) best = { lt, name: itemById(id)?.name, room: r.name };
    })));
    return best ? `Your biggest line item is "${best.name}" in ${best.room} at ${fmt(best.lt)}.` : 'Nothing is selected yet, so there\'s no cost driver to report.';
  }

  // deal / profit  (now also catches "good deal", "should I walk/pass", gives a live verdict)
  if (/\bprofit\b|\bmargin\b|\broi\b|make money|worth it|good deal|bad deal|max allowable|\bmao\b|should i (buy|offer|walk|pass|bid)/.test(q)){
    const d = P.deal, arv=+d.arv||0, pur=+d.purchase||0, rep=grandTotal();
    if (!arv||!pur) return 'Add ARV and purchase price on the Deal tab and I\'ll give you a live profit projection and a GO / CAUTION / NO-GO call.';
    const hold=(+d.weeks||0)*(+d.perWeek||0), sell=arv*((+d.sellPct||0)/100), profit=arv-(pur+rep+hold+sell);
    const verdict = profit>=25000 ? 'this looks like a GO' : profit>0 ? 'the margin is thin — CAUTION' : 'this is a NO-GO (projected loss)';
    return `Projected profit is ${fmt(profit)}, so ${verdict}. (ARV ${fmt(arv)} − purchase ${fmt(pur)} − repairs ${fmt(rep)} − holding ${fmt(hold)} − selling ${fmt(sell)}.) Max Allowable Offer by the 70% rule is ${fmt(arv*0.7-rep)}.`;
  }

  // retrieval over KB by keyword overlap
  let best = null;
  KB.forEach(e => {
    const score = e.k.reduce((s,kw) => s + (q.includes(kw) ? 1 : 0), 0);
    if (score > 0 && (!best || score > best.score)) best = { score, a: e.a };
  });
  if (best) return best.a;

  // honest fallback — say "I don't know" instead of firing an irrelevant canned answer
  return 'I don\'t have a confident answer for that — I\'m an offline assistant focused on this walkthrough. I can help with the running total, your biggest cost, what\'s left to review, the deal/profit math, or a repair area like HVAC, roof, foundation, electrical, kitchen, bath, flooring, or exterior.';
}

        <div><label class="text-[12px] font-semibold text-gray-500">Unit</label><input id="ci_unit" placeholder="ea." class="w-full mt-1 px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-spark"/></div>
      </div>
    </div>
    <button data-m="saveitem" data-g="${gid}" class="press w-full mt-5 py-3 bg-spark text-white rounded-xl font-bold">Add item</button>
  </div>`);
  setTimeout(()=>document.getElementById('ci_name')?.focus(),100);
}

function modalGlobalPrice() {
  const edited = Object.keys(GLOBAL.prices);
  modal(`<div class="px-5 pb-8 pt-2">
    <h3 class="font-bold text-lg mb-1">Standard pricing</h3>

        <div class="min-w-0"><div class="font-semibold text-[14px] truncate">${esc(it.name)}</div><div class="text-[11px] text-gray-400">default ${fmt2(it.cost)} → <span class="text-spark font-semibold">${fmt2(GLOBAL.prices[id])}</span></div></div>
        <button data-m="resetGlobal" data-i="${id}" class="press text-[12px] text-red-500 font-semibold flex-shrink-0">reset</button></div>`:''}).join('')}</div>`}
  </div>`);
}

/* =====================================================================
   11. EVENT BINDING
   ===================================================================== */
function on(act, fn) { return el => el.addEventListener(act === 'input' ? 'input' : 'click', fn); }

function bind() {
  $app.querySelectorAll('[data-act]').forEach(el => {
    const a = el.dataset.act;
    if (a === 'qtyin' || a === 'cap') {
      el.addEventListener('change', handle);
      el.addEventListener('click', e => e.stopPropagation());
    } else if (a === 'deal') {
      el.addEventListener('input', handle);
    } else if (a === 'addphoto') {
      el.addEventListener('change', handle);
    } else {
      el.addEventListener('click', handle);
    }
  });
  const ci = document.getElementById('chatin');
  if (ci) ci.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendChat(); } });
  const log = document.getElementById('chatlog');
  if (log) log.scrollTop = log.scrollHeight;
}
function bindModal() {
  $modal.querySelectorAll('[data-m]').forEach(el => el.addEventListener('click', handleModal));
}

function handle(e) {
  const el = e.currentTarget; const a = el.dataset.act; const d = el.dataset;
  switch (a) {
    case 'new': P = blankProject('Estimate ' + (projects.length + 1)); save(); render(); break;
    case 'open': openProject(d.id); break;
    case 'projects': modalProjects(); break;
    case 'tab': UI.tab = d.tab; render(); break;
    case 'room': UI.roomId = d.id; render(); break;
    case 'addroom': modalAddRoom(); break;
    case 'delroom': confirmDel('Remove this room and its selections?', () => removeRoom(d.id)); break;
    case 'grp': UI.openGroups[d.k] = !UI.openGroups[d.k]; render(); break;
    case 'nan': toggleNan(d.k, el.checked); break;
    case 'chk': toggleCheck(d.r, d.g, d.i); break;
    case 'qty': stepQty(d.r, d.g, d.i, +d.d); break;
    case 'qtyin': setQty(d.r, d.g, d.i, el.value); break;
    case 'price': modalPrice(d.i); break;
    case 'additem': modalAddItem(d.g); break;
    case 'delitem': confirmDel('Delete this line item from the catalog?', () => deleteItem(d.i)); break;
    case 'addphoto': addPhotos(el.files); break;
    case 'live': startLive(); break;
    case 'capmic': voiceInput('cap_' + d.id); break;
    case 'cap': setCaption(d.id, el.value); break;
    case 'ocr': runOCR(d.id); break;
    case 'delphoto': delPhoto(d.id); break;
    case 'deal': P.deal[d.k] = el.value; save(); softUpdateDeal(); break;
    case 'export': doExport(); break;
    case 'delproj': confirmDel('Delete this estimate permanently?', () => delProject(d.id)); break;
    case 'globalprice': modalGlobalPrice(); break;
    case 'rec': applyRec(d.r, d.g, d.i); break;
    case 'chatsend': sendChat(); break;
    case 'chip': document.getElementById('chatin').value = d.q; sendChat(); break;
    case 'chatmic': voiceInput('chatin'); break;
  }
}

/* ---------- copilot actions ---------- */
function applyRec(r, g, i) {
  P.cells[cellKey(r, g, i)] = { q: 1 };
  if (P.nan[nanKey(r, g)]) delete P.nan[nanKey(r, g)];
  save(); render(); toast(itemById(i).name + ' added');
}
function sendChat() {
  const el = document.getElementById('chatin'); if (!el) return;
  const q = el.value.trim(); if (!q) return;
  CHAT.push({ role: 'user', text: q });
  CHAT.push({ role: 'bot', text: assistantAnswer(q) });
  if (CHAT.length > 40) CHAT = CHAT.slice(-40);
  render();
  const log = document.getElementById('chatlog'); if (log) log.scrollTop = log.scrollHeight;
  document.getElementById('chatin')?.focus();
}
/* Web Speech API dictation (graceful fallback when unsupported) */
function voiceInput(targetId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice input not supported on this browser'); return; }
  const rec = new SR(); rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 1;
  toast('Listening…');
  rec.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const el = document.getElementById(targetId);
    if (el) { el.value = (el.value ? el.value + ' ' : '') + txt; el.focus(); }
    if (targetId === 'chatin') sendChat();
    else if (targetId.startsWith('cap_')) { setCaption(targetId.slice(4), el.value); toast('Caption: ' + txt); }
  };
  rec.onerror = () => toast('Could not capture audio');
  try { rec.start(); } catch { toast('Voice unavailable'); }
}
function handleModal(e) {
  const el = e.currentTarget; const m = el.dataset.m; const d = el.dataset;
  switch (m) {
    case 'new': closeModal(); P = blankProject('Estimate ' + (projects.length + 1)); save(); render(); break;
    case 'open': closeModal(); openProject(d.id); break;
    case 'home': closeModal(); P = null; setLS(LS.current,''); render(); break;
    case 'rename': renameProject(); break;
    case 'room': closeModal(); addRoom(P, d.t); break;
    case 'priceProj': savePrice(d.i, 'project'); break;
    case 'priceGlobal': savePrice(d.i, 'global'); break;
    case 'priceReset': resetPrice(d.i); break;
    case 'saveitem': saveCustomItem(d.g); break;
    case 'resetGlobal': delete GLOBAL.prices[d.i]; saveGlobal(); modalGlobalPrice(); toast('Reset'); break;
  }
}

/* ---------- action helpers ---------- */
function toggleCheck(r, g, i) {
  const k = cellKey(r, g, i);
  if (P.cells[k]) delete P.cells[k];
  else { P.cells[k] = { q: 1 }; if (P.nan[nanKey(r,g)]) delete P.nan[nanKey(r,g)]; }
  save(); render();
}
function toggleNan(k, on) {
  if (on) {
    P.nan[k] = true;
    // clear any checked items in that group
    Object.keys(P.cells).forEach(ck => { if (ck.startsWith(k + '|')) delete P.cells[ck]; });
  } else delete P.nan[k];
  save(); render();
}
function stepQty(r, g, i, dlt) {
  const k = cellKey(r, g, i); const c = P.cells[k] || { q: 1 };
  c.q = Math.max(0, Math.round(((c.q || 1) + dlt) * 100) / 100);
  P.cells[k] = c; save(); render();
}
function setQty(r, g, i, val) {
  const k = cellKey(r, g, i); const n = parseFloat(val);
  P.cells[k] = { q: isNaN(n) ? 0 : Math.max(0, n) }; save(); render();
}
function savePrice(id, scope) {
  const v = parseFloat(document.getElementById('priceInput').value);
  if (isNaN(v) || v < 0) { toast('Enter a valid price'); return; }
  if (scope === 'project') { P.priceOverrides[id] = v; save(); }
  else { GLOBAL.prices[id] = v; saveGlobal(); }
  closeModal(); render(); toast(scope === 'global' ? 'Standard price updated' : 'Price set for project');
}
function resetPrice(id) { delete P.priceOverrides[id]; delete GLOBAL.prices[id]; save(); saveGlobal(); closeModal(); render(); toast('Reset to default'); }
function saveCustomItem(gid) {
  const name = document.getElementById('ci_name').value.trim();
  const cost = parseFloat(document.getElementById('ci_cost').value);
  const unit = document.getElementById('ci_unit').value.trim() || 'ea.';
  if (!name) { toast('Enter a name'); return; }
  if (isNaN(cost) || cost < 0) { toast('Enter a valid cost'); return; }
  const id = 'cu-' + Date.now().toString(36);
  GLOBAL.custom.push({ id, name, cost, unit, groupId: gid }); saveGlobal();
  closeModal(); render(); toast('Item added');
}
function deleteItem(id) {
  if (!GLOBAL.deleted.includes(id)) GLOBAL.deleted.push(id);
  GLOBAL.custom = GLOBAL.custom.filter(c => c.id !== id);
  saveGlobal();
  // purge from every project cell
  Object.keys(P.cells).forEach(k => { if (k.endsWith('|' + id)) delete P.cells[k]; });
  save(); render(); toast('Item deleted');
}
function renameProject() {
  const name = prompt('Estimate name', P.name);
  if (name && name.trim()) { P.name = name.trim(); save(); closeModal(); render(); }
}
function delProject(id) {
  projects = projects.filter(p => p.id !== id);
  setLS(LS.projects, projects);
  if (P && P.id === id) { P = null; setLS(LS.current, ''); }
  render();
}
function softUpdateDeal() {
  // lightweight: re-render only the deal view to keep inputs focused
  if (UI.tab !== 'deal') return;
  clearTimeout(softUpdateDeal._t);
  softUpdateDeal._t = setTimeout(() => {
    const main = $app.querySelector('main'); if (!main) return;
    const active = document.activeElement; const k = active?.dataset?.k; const pos = active?.selectionStart;
    main.innerHTML = viewDeal(); bind();
    if (k) { const ne = main.querySelector(`[data-k="${k}"]`); if (ne) { ne.focus(); try{ne.setSelectionRange(pos,pos);}catch{} } }
    document.getElementById('grand').textContent = fmt(grandTotal());
  }, 120);
}

/* ---------- photos ---------- */
function addPhotos(files) {
  if (!files || !files.length) return;
  let pending = files.length, added = 0;
  const done = () => { if (--pending === 0) { save(); render(); toast(added ? (added > 1 ? added + ' photos added' : 'Photo added') : 'Could not read that photo'); } };
  [...files].forEach(f => {
    if (!/^image\//.test(f.type)) { toast('That file is not an image'); done(); return; }
    const reader = new FileReader();
    reader.onload = () => {
      compress(reader.result, 1280, 0.7).then(data => {
        if (!setLS('__probe__', data.length)) { toast('Storage full — delete some photos first', 4000); done(); return; }
        localStorage.removeItem('__probe__');
        P.photos.push({ id: 'ph' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), data, caption: '', serial: '' });
        added++; done();
      }).catch(() => { toast('Could not process that photo'); done(); });
    };
    reader.onerror = () => { toast('Could not read that photo'); done(); };
    reader.readAsDataURL(f);
  });
}
function compress(dataUrl, maxW, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = img.width * scale; c.height = img.height * scale;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = () => res(dataUrl);
    img.src = dataUrl;
  });
}
function setCaption(id, v) { const ph = P.photos.find(p => p.id === id); if (ph) { ph.caption = v; save(); } }
function delPhoto(id) { P.photos = P.photos.filter(p => p.id !== id); save(); render(); }

/* ---------- live video capture (camera walkthrough → grab frames) ---------- */
let _liveStream = null;
async function startLive() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { toast('Camera not available — use Photo / upload'); return; }
  const ov = document.createElement('div');
  ov.id = 'liveOverlay';
  ov.className = 'fixed inset-0 z-[70] bg-black flex flex-col';
  ov.innerHTML = `
    <video id="liveVid" autoplay playsinline muted class="flex-1 w-full object-cover"></video>
    <div id="liveCount" class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 text-white text-sm font-semibold px-3 py-1 rounded-full" style="top:max(1rem,env(safe-area-inset-top))">0 frames captured</div>
    <div class="absolute bottom-0 inset-x-0 flex items-center justify-around p-6" style="padding-bottom:max(1.5rem,env(safe-area-inset-bottom))">
      <button id="liveDone" class="text-white font-semibold text-[15px] px-4 py-2">Done</button>
      <button id="liveSnap" class="w-18 h-18 rounded-full bg-white ring-4 ring-white/40" style="width:72px;height:72px"></button>
      <button id="liveMic" class="text-white text-2xl px-4 py-2" title="Voice note">🎙️</button>
    </div>`;
  document.body.appendChild(ov);
  try {
    _liveStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    const v = document.getElementById('liveVid');
    v.srcObject = _liveStream;
    await v.play().catch(() => {}); // iOS Safari needs an explicit play() after srcObject
  } catch (e) {
    stopLive();
    const n = e && e.name;
    const msg = n === 'NotAllowedError' || n === 'SecurityError'
        ? 'Camera blocked. Tap the lock / “aA” icon in the address bar → allow Camera, then retry. Use the https link, not an embedded preview.'
      : (n === 'NotFoundError' || n === 'DevicesNotFoundError' || n === 'OverconstrainedError')
        ? 'No usable camera found — use “Photo / upload” instead.'
      : n === 'NotReadableError'
        ? 'Camera is in use by another app. Close it and retry.'
        : 'Could not start the camera — use “Photo / upload” instead.';
    toast(msg, 6000);
    return;
  }
  let count = 0;
  document.getElementById('liveSnap').onclick = () => {
    const v = document.getElementById('liveVid');
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    compress(c.toDataURL('image/jpeg', 0.8), 1280, 0.7).then(data => {
      P.photos.push({ id: 'ph' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), data, caption: 'Live frame ' + new Date().toLocaleTimeString(), serial: '' });
      save();
      count++; const cc = document.getElementById('liveCount'); if (cc) cc.textContent = count + ' frame' + (count!==1?'s':'') + ' captured';
      const b = document.getElementById('liveSnap'); if (b) { b.style.transform = 'scale(.85)'; setTimeout(() => b.style.transform = '', 120); }
    });
  };
  document.getElementById('liveMic').onclick = () => liveVoiceNote();
  document.getElementById('liveDone').onclick = () => { stopLive(); render(); toast(count ? count + ' frames saved' : 'Capture ended'); };
}
function stopLive() {
  if (_liveStream) { _liveStream.getTracks().forEach(t => t.stop()); _liveStream = null; }
  document.getElementById('liveOverlay')?.remove();
}
/* voice note during live capture → caption the most recent frame */
function liveVoiceNote() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice not supported here'); return; }
  const rec = new SR(); rec.lang = 'en-US'; rec.interimResults = false;
  toast('Listening… describe what you see');
  rec.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const last = P.photos[P.photos.length - 1];
    if (last) { last.caption = txt; save(); toast('Note saved: ' + txt); }
    else toast('Capture a frame first, then add a note');
  };
  rec.onerror = () => toast('Could not capture audio');
  try { rec.start(); } catch { toast('Voice unavailable'); }
}

/* serial-number OCR via Tesseract (lazy-loaded) */
function loadTesseract() {
  return new Promise((res, rej) => {
    if (window.Tesseract) return res();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
}
async function runOCR(id) {
  const ph = P.photos.find(p => p.id === id); if (!ph) return;
  toast('Scanning… (first scan downloads OCR engine)');
  try {
    await loadTesseract();
    const { data } = await Tesseract.recognize(ph.data, 'eng');
    const text = (data.text || '').toUpperCase();
    // serial heuristics: labelled serial, else longest alphanumeric token
    let serial = '';
    const lbl = text.match(/(?:SERIAL|SER|S\/N|SN|MODEL|MFG)[^A-Z0-9]{0,4}([A-Z0-9][A-Z0-9\-]{4,})/);
    if (lbl) serial = lbl[1];
    else {
      const toks = text.replace(/[^A-Z0-9\s\-]/g, ' ').split(/\s+/).filter(t => t.length >= 6 && /[0-9]/.test(t) && /[A-Z]/.test(t));
      toks.sort((a, b) => b.length - a.length); serial = toks[0] || '';
    }
    ph.serial = serial || '(none found)';
    save(); render();
    toast(serial ? 'Serial: ' + serial : 'No serial detected');
  } catch (err) {
    toast('OCR unavailable offline (needs first online load)');
  }
}

/* ---------- export ZIP (Excel + photos) ---------- */
async function doExport() {
  if (UI.busy) return; UI.busy = true;
  toast('Building ZIP…');
  try {
    const wb = XLSX.utils.book_new();
    const rows = [
      ['SPARK EQUITY GROUP — REPAIR ESTIMATE'],
      ['Project', P.name],
      ['Address', P.address || '—'],
      ['Date', new Date().toLocaleString()],
      [],
      ['Room', 'Section', 'Group', 'Item', 'Qty', 'Unit', 'Unit Cost', 'Line Total']
    ];
    let grand = 0;
    P.rooms.forEach(r => {
      const t = ROOM_TYPES[r.type];
      t.groups.forEach(g => {
        groupItemIds(g).forEach(id => {
          if (!isChecked(r.id, g, id)) return;
          const it = itemById(id); const c = P.cells[cellKey(r.id, g, id)];
          const lt = lineTotal(r.id, g, id); grand += lt;
          rows.push([r.name, t.section, GROUPS[g].label, it.name, c.q, it.unit, priceOf(id), lt]);
        });
      });
    });
    rows.push([]);
    rows.push(['', '', '', '', '', '', 'GRAND TOTAL', grand]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:16},{wch:20},{wch:22},{wch:38},{wch:6},{wch:12},{wch:12},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, 'Estimate');

    // Deal analysis sheet
    const d = P.deal, arv = +d.arv||0, pur = +d.purchase||0, hold = (+d.weeks||0)*(+d.perWeek||0), sell = arv*((+d.sellPct||0)/100);
    const tc = pur+grand+hold+sell, profit = arv-tc;
    const dws = XLSX.utils.aoa_to_sheet([
      ['DEAL ANALYSIS'], [],
      ['After-Repair Value', arv], ['Purchase Price', pur], ['Repair Estimate', grand],
      ['Holding Costs', hold], ['Selling Costs', sell], ['Total Cost Basis', tc],
      ['Projected Profit', profit], ['Return on Cost', tc?(profit/tc):0],
      ['70% Rule Max Offer', arv*0.7-grand]
    ]);
    dws['!cols']=[{wch:24},{wch:16}];
    XLSX.utils.book_append_sheet(wb, dws, 'Deal Analysis');

    const xlsxBuf = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });

    const zip = new JSZip();
    const safe = P.name.replace(/[^\w\-]+/g, '_');
    zip.file(`${safe}_estimate.xlsx`, xlsxBuf);
    if (P.photos.length) {
      const pf = zip.folder('photos');
      P.photos.forEach((ph, i) => {
        const b64 = ph.data.split(',')[1];
        const nm = (ph.caption ? ph.caption.replace(/[^\w\-]+/g,'_') : `photo_${i+1}`) + (ph.serial && ph.serial!=='(none found)' ? `_SN-${ph.serial.replace(/[^\w\-]+/g,'')}` : '') + '.jpg';
        pf.file(nm, b64, { base64: true });
      });
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${safe}_${new Date().toISOString().slice(0,10)}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    toast('ZIP downloaded ✓');
  } catch (err) {
    console.error(err); toast('Export failed: ' + err.message);
  } finally { UI.busy = false; }
}

/* ---------- misc UI ---------- */
let _toastT;
function toast(msg, ms) {
  const t = document.getElementById('toast');
  t.className = 'toast fixed left-1/2 bottom-24 z-[60] bg-ink text-white text-sm font-semibold px-4 py-2.5 rounded-full shadow-lg max-w-[88%] text-center leading-snug';
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.add('hidden'), ms || 2200);
}
function confirmDel(msg, fn) {
  modal(`<div class="px-5 pb-8 pt-2 text-center">
    <div class="text-3xl mb-2">⚠️</div>
    <p class="font-semibold mb-5">${msg}</p>
    <button id="cfd" class="press w-full py-3 bg-red-500 text-white rounded-xl font-bold mb-2">Delete</button>
    <button data-act="backdrop" onclick="event.target.closest('#modal')&&(document.getElementById('modal').classList.add('hidden'),document.getElementById('modal').innerHTML='')" class="press w-full py-2.5 text-gray-500 font-semibold">Cancel</button>
  </div>`);
  document.getElementById('cfd').addEventListener('click', () => { closeModal(); fn(); });
}

  const curId = j(LS.current, '');

  else render();
}
boot();

if ('serviceWorker' in navigator) {
  let _refreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_refreshed) return; _refreshed = true; location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.update();
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw && nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('skipWaiting');
        });
      });
    }).catch(()=>{});
  });
}

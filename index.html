<style>
  :root { --spark: #d05000; }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: contain; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f1f3f6;
    color: #0f0f10;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  /* Smooth accordion */
  .acc { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .32s cubic-bezier(.4,0,.2,1); }
  .acc.open { grid-template-rows: 1fr; }
  .acc > .acc-inner { overflow: hidden; }
  /* Tab views fade/slide */
  .view { animation: viewIn .28s cubic-bezier(.16,1,.3,1); }
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  /* Modal */
  .sheet-back { animation: fade .2s ease; }
  .sheet { animation: sheetUp .34s cubic-bezier(.16,1,.3,1); }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
  .pop { animation: pop .26s cubic-bezier(.16,1,.3,1); }
  @keyframes pop { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  /* Pressable feedback */
  .press { transition: transform .12s ease, background-color .15s ease; }
  .press:active { transform: scale(.96); }
  .checked-glow { box-shadow: 0 0 0 1.5px var(--spark) inset; }
  /* total number flip */
  .total-bump { animation: bump .35s cubic-bezier(.16,1,.3,1); }
  @keyframes bump { 0% { transform: scale(1); } 40% { transform: scale(1.06); color: var(--spark); } 100% { transform: scale(1); } }
  /* progress bar fill */
  .pfill { transition: width .5s cubic-bezier(.16,1,.3,1); }
  /* hide scrollbar on tab strip */
  .noscroll::-webkit-scrollbar { display: none; }
  .noscroll { -ms-overflow-style: none; scrollbar-width: none; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .toast { animation: toastIn .3s cubic-bezier(.16,1,.3,1); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
  @media (prefers-reduced-motion: reduce) {
    *, .view, .sheet, .pop, .acc { animation: none !important; transition: none !important; }
  }
  /* ---- Dark mode (toggle adds .dark to <html>) ---- */
  html.dark body { background:#0b1220; color:#e2e8f0; }
  html.dark .bg-white { background-color:#1b2536 !important; }
  html.dark .bg-white\/95 { background-color:rgba(11,18,32,.95) !important; }
  html.dark .bg-\[\#f1f3f6\] { background-color:#0b1220 !important; }
  html.dark .bg-gray-100 { background-color:#334155 !important; }
  html.dark .bg-gray-50 { background-color:#1b2536 !important; }
  html.dark .bg-spark-50 { background-color:#3a2418 !important; }
  html.dark .text-gray-900, html.dark .text-gray-800, html.dark .text-gray-700,
  html.dark .text-gray-600, html.dark .text-gray-500 { color:#cbd5e1 !important; }
  html.dark .text-gray-400, html.dark .text-gray-300 { color:#8b9bb0 !important; }
  html.dark .border-gray-200, html.dark .border-gray-100, html.dark .border-gray-50 { border-color:#334155 !important; }
  html.dark input { background-color:#0b1220; color:#e2e8f0; }
  html.dark input::placeholder { color:#64748b; }
  html.dark .shadow-sm, html.dark .shadow, html.dark .shadow-lg { box-shadow:0 1px 3px rgba(0,0,0,.45) !important; }
  /* keep the brand logo visible on dark surfaces */
  html.dark img[src*="spark-logo"] { filter: brightness(0) invert(1); }
  /* smooth theme flip: transition colours only while toggling (no relayout) */
  html.theme-anim *:not(.themesw):not(.knob) {
    transition: background-color .4s ease, color .4s ease, border-color .4s ease, fill .4s ease !important;
  }
  /* iOS-style theme switch */
  .themesw { display:inline-flex; align-items:center; width:46px; height:26px; border-radius:999px;
    background:#cbd5e1; position:relative; flex-shrink:0; vertical-align:middle; transition:background-color .3s ease; }
  html.dark .themesw { background:var(--spark); }
  .themesw .knob { position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center;
    transition:transform .45s cubic-bezier(.34,1.4,.5,1); }
  .themesw .knob::after { content:'\2600'; font-size:12px; color:#f59e0b; line-height:1; }         /* sun (light) */
  html.dark .themesw .knob { transform:translateX(20px) rotate(360deg); }                           /* roll right */
  html.dark .themesw .knob::after { content:'\263E'; color:#334155; }                                /* moon (dark) */

/* ---------- 4. STORAGE ---------- */
const LS = {
  projects: 'spark_projects_v1',
  current:  'spark_current_v1',
  global:   'spark_global_v1'   // { prices:{}, custom:[], deleted:[] }
};
const j = (k, fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
const setLS = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch { return false; } };

// dark mode: apply the saved preference before first paint
try { if (localStorage.getItem('spark_dark') === '1') document.documentElement.classList.add('dark'); } catch(e){}
function isDark(){ return document.documentElement.classList.contains('dark'); }
function toggleDark(){
  const el = document.documentElement;
  el.classList.add('theme-anim');               // enable colour transitions just for the flip
  const on = el.classList.toggle('dark');        // pure CSS drives the switch + surfaces, no re-render
  try { localStorage.setItem('spark_dark', on ? '1' : '0'); } catch(e){}
  clearTimeout(toggleDark._t);
  toggleDark._t = setTimeout(() => el.classList.remove('theme-anim'), 500);
}
const darkBtn = (cls) => `<button data-act="dark" role="switch" aria-label="Toggle dark mode" class="themesw ${cls||''}"><span class="knob"></span></button>`;

let GLOBAL = j(LS.global, { prices: {}, custom: [], deleted: [] });
function saveGlobal() { setLS(LS.global, GLOBAL); }

/* effective catalog = price list + custom items, minus deleted */
function catalog() {
  return [...PRICE_LIST, ...GLOBAL.custom].filter(it => !GLOBAL.deleted.includes(it.id));
}
function itemById(id) { return catalog().find(i => i.id === id); }
function groupItemIds(gid) {
  const base = (GROUPS[gid]?.ids || []).filter(id => !GLOBAL.deleted.includes(id));
  const extra = GLOBAL.custom.filter(c => c.groupId === gid).map(c => c.id);
  return [...base, ...extra];
}
/* price resolution: project override -> global override -> list default */
function priceOf(id) {
  if (P && P.priceOverrides[id] != null) return P.priceOverrides[id];
  if (GLOBAL.prices[id] != null) return GLOBAL.prices[id];
  const it = itemById(id); return it ? it.cost : 0;
}

    rooms: [],
    cells: {},          // "roomId|groupId|itemId" -> {q}
    nan: {},            // "roomId|groupId" -> true
    priceOverrides: {}, // itemId -> cost (per project)
    photos: [],         // {id,data,caption,serial}
    deal: { arv: '', purchase: '', weeks: 8, perWeek: 350, sellPct: 8 }
  };
  // sensible defaults: the house-wide singletons + 1 kitchen + 1 bath
  ['interior','systems','exterior','kitchen'].forEach(t => addRoom(p, t, true));
  addRoom(p, 'bathroom', true);
  return p;
}
function addRoom(p, type, silent) {
  const t = ROOM_TYPES[type];
  if (t.single && p.rooms.some(r => r.type === type)) { if(!silent) toast(t.label + ' already added'); return; }
  const count = p.rooms.filter(r => r.type === type).length;
  const name = t.single ? t.label : `${t.label} ${count + 1}`;
  const room = { id: 'r' + Math.random().toString(36).slice(2, 8), type, name };
  p.rooms.push(room);
  if (!silent) { UI.roomId = room.id; save(); toast(name + ' added'); render(); }
  return room;
}
function removeRoom(roomId) {
  P.rooms = P.rooms.filter(r => r.id !== roomId);
  Object.keys(P.cells).forEach(k => { if (k.startsWith(roomId + '|')) delete P.cells[k]; });
  Object.keys(P.nan).forEach(k => { if (k.startsWith(roomId + '|')) delete P.nan[k]; });
  if (UI.roomId === roomId) UI.roomId = P.rooms[0]?.id || null;
  save(); render();
}

const cellKey = (r, g, i) => `${r}|${g}|${i}`;
const nanKey  = (r, g) => `${r}|${g}`;

function save() {
  if (!P) return;
  P.savedAt = new Date().toISOString();
  const idx = projects.findIndex(x => x.id === P.id);
  if (idx >= 0) projects[idx] = P; else projects.unshift(P);
  const ok = setLS(LS.projects, projects);
  if (!ok) {
    // quota: retry stripping photo blobs of *other* projects
    const slim = projects.map(p => p.id === P.id ? p : { ...p, photos: [] });
    setLS(LS.projects, slim);
  }
  setLS(LS.current, P.id);
}
// debounced save for high-frequency inputs (typing) — avoids serializing the
// whole projects array (incl. base64 photos) on every keystroke.
let _saveT;
function saveSoon(){ clearTimeout(_saveT); _saveT = setTimeout(save, 400); }
function openProject(id) {
  P = projects.find(p => p.id === id);
  if (!P) return;
  UI.roomId = P.rooms[0]?.id || null;
  UI.tab = 'estimate';
  setLS(LS.current, id);
  render();
}

/* ---------- 6. CALC ---------- */
function lineTotal(roomId, gid, id) {
  const c = P.cells[cellKey(roomId, gid, id)];
  if (!c) return 0;
  return (c.q || 0) * priceOf(id);
}
function groupTotal(roomId, gid) {
  return groupItemIds(gid).reduce((s, id) => s + lineTotal(roomId, gid, id), 0);
}
function roomTotal(roomId) {
  const r = P.rooms.find(x => x.id === roomId); if (!r) return 0;
  return ROOM_TYPES[r.type].groups.reduce((s, g) => s + groupTotal(roomId, g), 0);
}
function grandTotal() { return P.rooms.reduce((s, r) => s + roomTotal(r.id), 0); }

function isChecked(roomId, gid, id) { const c = P.cells[cellKey(roomId, gid, id)]; return !!(c && c.q != null); }
function groupChecked(roomId, gid) { return groupItemIds(gid).filter(id => isChecked(roomId, gid, id)).length; }
function groupComplete(roomId, gid) { return !!P.nan[nanKey(roomId, gid)] || groupChecked(roomId, gid) > 0; }

function progress() {
  let total = 0, done = 0;
  P.rooms.forEach(r => ROOM_TYPES[r.type].groups.forEach(g => { total++; if (groupComplete(r.id, g)) done++; }));
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

/* ---------- 7. FORMAT ---------- */
const fmt  = n => '$' + Math.round(n).toLocaleString('en-US');
const fmt2 = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc  = s => String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

   8. RENDER

}

/* ---- Deal Analyzer: profit waterfall (how the sale price splits) ---- */
function dealWaterfall(arv, purchase, repairs, holding, selling, totalCost, profit){
  const denom = Math.max(arv, totalCost) || 1;
  const pct = v => Math.max(0, Math.min(100, v / denom * 100));
  const seg = (val, color) => val > 0 ? `<div class="${color} h-full" style="width:${pct(val)}%"></div>` : '';
  const chip = (color, label) => `<span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm ${color}"></span>${label}</span>`;
  return `
  <div class="bg-white rounded-2xl p-4 shadow-sm">
    <div class="text-[12px] font-semibold text-gray-400 uppercase mb-2">Where the sale price goes</div>
    <div class="relative h-7 rounded-lg overflow-hidden bg-gray-100 flex">
      ${seg(purchase,'bg-gray-400')}${seg(repairs,'bg-spark')}${seg(holding,'bg-amber-300')}${seg(selling,'bg-gray-300')}${profit>0?`<div class="bg-green-500 h-full" style="width:${pct(profit)}%"></div>`:''}
      ${arv>0 && profit<0 ? `<div class="absolute top-0 bottom-0 w-0.5 bg-ink" style="left:${pct(arv)}%" title="ARV"></div>` : ''}
    </div>
    <div class="flex flex-wrap gap-x-3 gap-y-1 mt-2 text-[10px] text-gray-500">
      ${chip('bg-gray-400','Purchase')}${chip('bg-spark','Repairs')}${chip('bg-amber-300','Holding')}${chip('bg-gray-300','Selling')}${chip(profit>=0?'bg-green-500':'bg-red-500', profit>=0?'Profit':'Loss')}
    </div>
    ${(arv && purchase)
      ? `<p class="text-[11px] text-gray-400 mt-2 leading-snug">Of the <span class="font-semibold text-gray-600">${fmt(arv)}</span> sale price, <span class="font-semibold text-gray-600">${fmt(totalCost)}</span> is cost, leaving <span class="font-bold ${profit>=0?'text-green-600':'text-red-500'}">${fmt(Math.abs(profit))} ${profit>=0?'profit':'loss'}</span>.</p>`
      : `<p class="text-[11px] text-gray-400 mt-2">Enter ARV and purchase price to see the split.</p>`}
  </div>`;
}

/* ---- Deal Analyzer (creative addition) ---- */
function viewDeal() {
  const d = P.deal; const repairs = grandTotal();
  const arv = +d.arv || 0, purchase = +d.purchase || 0;
  const holding = (+d.weeks || 0) * (+d.perWeek || 0);
  const selling = arv * ((+d.sellPct || 0) / 100);
  const totalCost = purchase + repairs + holding + selling;
  const profit = arv - totalCost;
  const roi = totalCost > 0 ? (profit / totalCost * 100) : 0;
  const mao = arv * 0.7 - repairs; // 70% rule max allowable offer
  let verdict, vc, vmsg;
  if (!arv || !purchase) { verdict='Enter numbers'; vc='bg-gray-100 text-gray-500'; vmsg='Add ARV and purchase price to analyze the deal.'; }
  else if (profit >= 25000 && roi >= 15) { verdict='GO'; vc='bg-green-100 text-green-700'; vmsg='Healthy margin. Numbers support an offer.'; }
  else if (profit > 0) { verdict='CAUTION'; vc='bg-amber-100 text-amber-700'; vmsg='Thin margin. Recheck repairs and holding time.'; }
  else { verdict='NO-GO'; vc='bg-red-100 text-red-700'; vmsg='Projected loss at this price. Offer lower or walk.'; }

  const row = (l, v, sub) => `<div class="flex justify-between items-baseline py-2 border-b border-gray-100"><span class="text-gray-500 text-[13px]">${l}${sub?`<span class="block text-[10px] text-gray-300">${sub}</span>`:''}</span><span class="font-semibold">${v}</span></div>`;
  const inp = (k, ph, pre) => `<div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">${pre||''}</span><input data-act="deal" data-k="${k}" value="${esc(d[k])}" placeholder="${ph}" inputmode="decimal" class="w-full ${pre?'pl-7':'pl-3'} pr-3 py-2.5 rounded-xl border border-gray-200 font-semibold outline-none focus:border-spark" /></div>`;

  return `
  <div class="view px-4 py-4 space-y-4">
    <div>
      <h2 class="font-bold text-lg flex items-center gap-2">📊 Deal Analyzer</h2>
      <p class="text-[12px] text-gray-400">Live profit projection from your live repair estimate.</p>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">After-Repair Value (ARV)</label>${inp('arv','280,000','$')}</div>
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Purchase Price</label>${inp('purchase','150,000','$')}</div>
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Hold Time (weeks)</label>${inp('weeks','8')}</div>
      <div><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Holding $/week</label>${inp('perWeek','350','$')}</div>
      <div class="col-span-2"><label class="text-[11px] font-semibold text-gray-500 mb-1 block">Selling Costs (% of ARV)</label>${inp('sellPct','8','%')}</div>
    </div>

    <div class="rounded-2xl ${vc} p-4 pop">
      <div class="flex items-center justify-between">
        <span class="font-extrabold text-2xl tracking-tight">${verdict}</span>
        ${arv&&purchase?`<div class="text-right"><div class="text-[11px] font-semibold opacity-70">Projected Profit</div><div class="font-extrabold text-2xl">${fmt(profit)}</div></div>`:''}
      </div>
      <p class="text-[12px] mt-1 font-medium opacity-90">${vmsg}</p>
    </div>

    ${(arv && purchase) ? `<div class="bg-white rounded-2xl p-4 shadow-sm">${dealGauge(roi)}</div>` : ''}

    ${dealWaterfall(arv, purchase, repairs, holding, selling, totalCost, profit)}

    <div class="bg-white rounded-2xl p-4 shadow-sm">
      ${row('Repair estimate', fmt(repairs), 'live from this walkthrough')}
      ${row('Purchase price', fmt(purchase))}
      ${row('Holding costs', fmt(holding), `${d.weeks||0} wk × ${fmt2(+d.perWeek||0)}`)}
      ${row('Selling costs', fmt(selling), `${d.sellPct||0}% of ARV`)}
      ${row('Total cost basis', fmt(totalCost))}
      <div class="flex justify-between items-baseline pt-3"><span class="font-bold">Return on cost</span><span class="font-extrabold ${roi>=15?'text-green-600':roi>0?'text-amber-600':'text-red-500'}">${roi.toFixed(1)}%</span></div>
    </div>

    <div class="bg-ink text-white rounded-2xl p-4">
      <div class="flex justify-between items-center">
        <div><div class="text-[11px] text-gray-400 font-semibold">70% RULE: Max Allowable Offer</div><div class="text-[10px] text-gray-500">ARV × 70% − repairs</div></div>
        <div class="font-extrabold text-2xl text-spark-500">${fmt(mao)}</div>
      </div>
    </div>
  </div>`;
}

/* =========================================================

const VIZ_COLORS = ['#d05000','#0f172a','#16a34a','#f59e0b','#0ea5e9','#a855f7','#ef4444','#14b8a6','#e11d48','#7c3aed'];
const fmtK = n => { n = Math.round(n); return Math.abs(n) >= 1000 ? '$' + (n/1000).toFixed(Math.abs(n) >= 10000 ? 0 : 1) + 'k' : '$' + n; };

/* Donut: cost share by category */
function donutChart(entries){
  const data = entries.filter(e => e.value > 0);
  const total = data.reduce((s,e)=>s+e.value,0);
  if (total <= 0) return `<p class="text-sm text-gray-400 py-2">Nothing selected yet.</p>`;
  const R=52, SW=20, C=2*Math.PI*R; let off=0;
  const rings = data.map((e,i)=>{
    const len = e.value/total*C;
    const c = `<circle cx="70" cy="70" r="${R}" fill="none" stroke="${VIZ_COLORS[i%VIZ_COLORS.length]}" stroke-width="${SW}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 70 70)"/>`;
    off += len; return c;
  }).join('');
  const legend = data.map((e,i)=>`<div class="flex items-center gap-2 text-[12px]">
      <span class="w-2.5 h-2.5 rounded-sm flex-shrink-0" style="background:${VIZ_COLORS[i%VIZ_COLORS.length]}"></span>
      <span class="flex-1 text-gray-600 truncate">${esc(e.label)}</span>
      <span class="font-semibold whitespace-nowrap">${fmt(e.value)}</span>
      <span class="text-gray-400 w-8 text-right">${Math.round(e.value/total*100)}%</span>
    </div>`).join('');
  return `<div class="flex items-center gap-3">
      <svg viewBox="0 0 140 140" class="w-28 h-28 flex-shrink-0">${rings}
        <text x="70" y="67" text-anchor="middle" fill="#0f172a" style="font-size:16px;font-weight:800">${fmtK(total)}</text>
        <text x="70" y="83" text-anchor="middle" fill="#94a3b8" style="font-size:9px;font-weight:700;letter-spacing:.08em">TOTAL</text>
      </svg>
      <div class="flex-1 space-y-1.5 min-w-0">${legend}</div>
    </div>`;
}

/* Gauge: return-on-cost speedometer */
function dealGauge(roi){
  const cx=110, cy=104, r=80, sw=16, min=-20, max=60;
  const ang = v => 180 - (Math.max(min,Math.min(max,v))-min)/(max-min)*180;
  const pt = (deg, rad) => [ (cx+rad*Math.cos(deg*Math.PI/180)).toFixed(2), (cy-rad*Math.sin(deg*Math.PI/180)).toFixed(2) ];
  const arc = (v1,v2,color) => { const [x1,y1]=pt(ang(v1),r),[x2,y2]=pt(ang(v2),r); return `<path d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="${sw}"/>`; };
  const [nx,ny] = pt(ang(roi), r-4);
  const color = roi>=15 ? '#16a34a' : roi>0 ? '#f59e0b' : '#ef4444';
  return `<svg viewBox="0 0 220 124" class="w-full" style="max-height:150px">
    ${arc(min,-0.4,'#ef4444')}${arc(0.4,14.6,'#f59e0b')}${arc(15,max,'#16a34a')}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="#0f172a"/>
    <text x="${cx}" y="${cy-24}" text-anchor="middle" fill="${color}" style="font-size:26px;font-weight:800">${roi.toFixed(0)}%</text>
    <text x="${cx}" y="${cy-9}" text-anchor="middle" fill="#94a3b8" style="font-size:9.5px;font-weight:700;letter-spacing:.05em">RETURN ON COST</text>
    <text x="20" y="120" fill="#94a3b8" style="font-size:9px">-20%</text>
    <text x="184" y="120" fill="#94a3b8" style="font-size:9px">60%+</text>
  </svg>`;
}

/* Treemap: rooms sized by cost (squarified) */
function treemap(entries){
  const data = entries.filter(e=>e.value>0).sort((a,b)=>b.value-a.value);
  if (!data.length) return `<p class="text-sm text-gray-400 py-2">Nothing selected yet.</p>`;
  const NW=100, NH=62, total=data.reduce((s,e)=>s+e.value,0);
  const items = data.map(e=>({ label:e.label, value:e.value, area:e.value/total*NW*NH }));
  const rects=[]; let x=0,y=0,w=NW,h=NH, rest=items.slice(), row=[];
  const worst=(arr,side)=>{ const s=arr.reduce((a,b)=>a+b,0),mx=Math.max(...arr),mn=Math.min(...arr); return Math.max(side*side*mx/(s*s), s*s/(side*side*mn)); };
  const lay=(rw)=>{ const sum=rw.reduce((a,b)=>a+b.area,0);
    if (w>=h){ const cw=sum/h; let yy=y; rw.forEach(r=>{ const ih=r.area/cw; rects.push({...r,x,y:yy,w:cw,h:ih}); yy+=ih; }); x+=cw; w-=cw; }
    else { const rh=sum/w; let xx=x; rw.forEach(r=>{ const iw=r.area/rh; rects.push({...r,x:xx,y,w:iw,h:rh}); xx+=iw; }); y+=rh; h-=rh; } };
  while (rest.length){ const side=Math.min(w,h), next=rest[0];
    if (!row.length || worst(row.map(r=>r.area),side) >= worst([...row,next].map(r=>r.area),side)) row.push(rest.shift());
    else { lay(row); row=[]; } }
  if (row.length) lay(row);
  const tiles = rects.map((r,i)=>{
    const small = (r.w/NW*100) < 24 || (r.h/NH*100) < 18;
    return `<div class="absolute" style="left:${(r.x/NW*100).toFixed(2)}%;top:${(r.y/NH*100).toFixed(2)}%;width:${(r.w/NW*100).toFixed(2)}%;height:${(r.h/NH*100).toFixed(2)}%;padding:1.5px">
      <div class="w-full h-full rounded-md p-1.5 flex flex-col justify-between overflow-hidden" style="background:${VIZ_COLORS[i%VIZ_COLORS.length]}">
        <div class="text-white font-semibold leading-tight truncate" style="font-size:${small?'9px':'11px'}">${esc(r.label)}</div>
        <div class="text-white font-bold" style="font-size:${small?'9px':'12px'};opacity:.95">${fmtK(r.value)}</div>
      </div></div>`;
  }).join('');
  return `<div class="relative w-full" style="aspect-ratio:${NW}/${NH}">${tiles}</div>`;
}

function firstRoom(type){ return P.rooms.find(r => r.type === type); }

/* ---- Agent: Inspection Coverage (intake + completeness validation) ---- */
function agentCoverage(){
  const f = [];
  const pr = progress();
  if (P.rooms.length === 0) f.push({ sev:'high', msg:'No rooms added yet — add the rooms in this house to begin.' });
  if (pr.total && pr.done < pr.total) f.push({ sev:'med', msg:`${pr.total - pr.done} of ${pr.total} groups still unreviewed. Mark each "No Action Needed" or add items so nothing is skipped.` });
  // big-ticket guard
  const sys = firstRoom('systems');
  if (sys){
    const big = [['hvac','HVAC / furnace'],['electrical','Electrical'],['structural','Structural / foundation'],['plumbing','Plumbing / water heater']];
    const missed = big.filter(([g]) => !groupComplete(sys.id, g)).map(([,l]) => l);
    if (missed.length) f.push({ sev:'high', msg:`Big-ticket items not yet reviewed: ${missed.join(', ')}. These swing estimates by thousands — never miss them.` });
  } else {
    f.push({ sev:'high', msg:'No "Systems & Structure" room — the hidden costs (HVAC, foundation, rewire) live here. Add it.' });
  }
  if (!(+P.deal.arv) || !(+P.deal.purchase)) f.push({ sev:'low', msg:'Deal inputs incomplete — add ARV and purchase price on the Deal tab for a profit verdict.' });
  if (f.length === 0) f.push({ sev:'ok', msg:'Full coverage — every group reviewed and big-ticket systems checked. Solid walkthrough.' });
  return f;
}

/* ---- Agent: Recommendations (related / commonly-paired items) ---- */
function agentRecommend(){
  const recs = [];
  const has = (rid,gid,id) => isChecked(rid,gid,id);
  const anySelection = Object.keys(P.cells).length > 0;
  const interior = firstRoom('interior'), sys = firstRoom('systems'), ext = firstRoom('exterior'), kit = firstRoom('kitchen');
  const add = (cond, target, title, why) => { if (cond && itemById(target.id) && !isChecked(target.rid,target.gid,target.id)) recs.push({ target, title, why }); };

  // new flooring anywhere -> trim out (interior/general)
  const floorIds = ['ig-01','ig-02','ig-03','ig-04','ig-05','ig-06'];
  const anyFloor = P.rooms.some(r => ROOM_TYPES[r.type].groups.includes('flooring') && floorIds.some(id => has(r.id,'flooring',id)));
  if (interior) add(anyFloor, {rid:interior.id,gid:'general',id:'ig-19'}, 'Add Trim-Out', 'New flooring almost always needs casing/baseboard re-installed.');

  if (sys){
    add(has(sys.id,'hvac','as-01'), {rid:sys.id,gid:'hvac',id:'as-06'}, 'Add Duct Cleaning', 'Replacing the furnace? Clean the ducts while the system is open.');
    const rewire = has(sys.id,'electrical','as-19') || has(sys.id,'electrical','as-20');
    add(rewire, {rid:sys.id,gid:'insulation',id:'as-23'}, 'Add New Drywall', 'A rewire to studs means drywall has to go back up.');
  }
  if (kit){
    const cab = ['kt-02','kt-03','kt-05'].some(id => has(kit.id,'cabinets',id));
    add(cab, {rid:kit.id,gid:'kcounters',id:'kt-06'}, 'Add Countertops', 'New cabinets usually pair with new countertops.');
  }
  if (ext) add(has(ext.id,'siding','ex-05'), {rid:ext.id,gid:'siding',id:'ex-07'}, 'Add Exterior Paint', 'New siding sections need to be painted to match.');

  // per-bathroom: tub tear-out without tile
  P.rooms.filter(r => r.type === 'bathroom').forEach(b => {
    const tearout = ['ba-10','ba-11','ba-13'].some(id => has(b.id,'tub',id));
    const tile = ['ba-05','ba-06'].some(id => has(b.id,'btile',id));
    if (tearout && !tile && itemById('ba-05')) recs.push({ target:{rid:b.id,gid:'btile',id:'ba-05'}, title:`Add Tile — ${b.name}`, why:'A tub/shower tear-out exposes the wall — budget tile.' });
  });

  // whole-house close-out
  if (interior && anySelection){
    add(true, {rid:interior.id,gid:'general',id:'ig-26'}, 'Add Haul-Off', 'Any demo/replacement generates debris that has to be hauled.');
    add(true, {rid:interior.id,gid:'general',id:'ig-27'}, 'Add Final Cleaning', 'Every flip needs a final clean before listing.');
  }
  return recs;
}

/* ---- Agent: Anomaly / risk detection (fraud-style outlier checks) ---- */
function agentAnomaly(){
  const flags = [];
  // quantity outliers
  Object.entries(P.cells).forEach(([k,c]) => {
    const [rid,gid,id] = k.split('|'); const it = itemById(id); if (!it) return;
    const u = it.unit.toLowerCase();
    const big = (/sqft|sf|lf|square/.test(u) && c.q > 5000) || (/ea\.|pier|tree|pane|door|handle|load|stump/.test(u) && c.q > 25);
    if (big) flags.push({ sev:'med', msg:`Unusual quantity: ${it.name} = ${c.q} ${it.unit}. Double-check before the offer.` });
  });
  // extreme price overrides
  const allOv = { ...GLOBAL.prices, ...P.priceOverrides };
  Object.entries(allOv).forEach(([id,v]) => {
    const it = PRICE_LIST.find(x => x.id === id); if (!it || !it.cost) return;
    const ratio = v / it.cost;
    if (ratio > 2.5 || ratio < 0.4) flags.push({ sev:'med', msg:`Price for "${it.name}" is ${ratio.toFixed(1)}× the list default (${fmt2(it.cost)} → ${fmt2(v)}). Confirm it's intentional.` });
  });
  // conflicting bathroom scope
  P.rooms.filter(r => r.type === 'bathroom').forEach(b => {
    const reglaze = ['ba-07','ba-08','ba-09'].some(id => isChecked(b.id,'tub',id));
    const tearout = ['ba-10','ba-11','ba-13'].some(id => isChecked(b.id,'tub',id));
    if (reglaze && tearout) flags.push({ sev:'high', msg:`${b.name}: both a reglaze and a tear-out are selected on the tub/shower — that's double-counting. Pick one.` });
  });
  // deal/estimate mismatch
  if ((+P.deal.arv) && grandTotal() === 0) flags.push({ sev:'low', msg:'Deal has an ARV but the repair estimate is $0 — the profit number is not yet trustworthy.' });
  if (flags.length === 0) flags.push({ sev:'ok', msg:'No anomalies detected. Quantities and pricing look reasonable.' });
  return flags;
}

/* ---- RAG-lite assistant: retrieve best KB answer + live estimate facts ---- */
/* ---- computed (exact) intents — instant, model-free ---- */
function computedAnswer(qRaw){
  const q = qRaw.toLowerCase().trim();
  const pr = progress();

  // greetings / pleasantries — don't let these fall through to a canned scan
  if (/^(hi|hey+|hello|yo|sup|howdy|good (morning|afternoon|evening))\b/.test(q) || /^(thanks|thank you|ty|thx|cool|nice|ok|okay)\b/.test(q))
    return 'Hey! Ask me about the running total, your biggest cost, what\'s left to review, the deal math, or any repair area — HVAC, roof, foundation, electrical, kitchen, bath, flooring, exterior.';

  // running total / cost so far
  if (/\btotal\b|how much|cost so far|running (estimate|total)|what.?s the (estimate|total)/.test(q))
    return `The running repair estimate is ${fmt(grandTotal())} across ${P.rooms.length} rooms (${pr.done}/${pr.total} groups reviewed).`;

  // what's missing / next  (tightened: no greedy "what.*do" that swallows off-topic questions)
  if (/missing|what.?s left|what.?s next|incomplete|remaining|still (need|to do|to review)|to review|haven.?t (done|reviewed|checked)|what should i (review|check|do) next/.test(q)){
    const cov = agentCoverage().filter(f => f.sev !== 'ok');
    return cov.length ? 'Coverage check: ' + cov.map(f => f.msg).join(' ') : 'You\'ve reviewed every group — nothing outstanding.';
  }

  // biggest cost driver
  if (/biggest|most expensive|driver|largest|priciest|top cost|costs? the most/.test(q)){
    let best = null;
    P.rooms.forEach(r => ROOM_TYPES[r.type].groups.forEach(g => groupItemIds(g).forEach(id => {
      const lt = lineTotal(r.id,g,id); if (lt > 0 && (!best || lt > best.lt)) best = { lt, name: itemById(id)?.name, room: r.name };
    })));
    return best ? `Your biggest line item is "${best.name}" in ${best.room} at ${fmt(best.lt)}.` : 'Nothing is selected yet, so there\'s no cost driver to report.';
  }

  // deal / profit  (now also catches "good deal", "should I walk/pass", gives a live verdict)
  if (/\bprofit\b|\bmargin\b|\broi\b|make money|worth it|good deal|bad deal|max allowable|\bmao\b|should i (buy|offer|walk|pass|bid)/.test(q)){
    const d = P.deal, arv=+d.arv||0, pur=+d.purchase||0, rep=grandTotal();
    if (!arv||!pur) return 'Add ARV and purchase price on the Deal tab and I\'ll give you a live profit projection and a GO / CAUTION / NO-GO call.';
    const hold=(+d.weeks||0)*(+d.perWeek||0), sell=arv*((+d.sellPct||0)/100), profit=arv-(pur+rep+hold+sell);
    const verdict = profit>=25000 ? 'this looks like a GO' : profit>0 ? 'the margin is thin — CAUTION' : 'this is a NO-GO (projected loss)';
    return `Projected profit is ${fmt(profit)}, so ${verdict}. (ARV ${fmt(arv)} − purchase ${fmt(pur)} − repairs ${fmt(rep)} − holding ${fmt(hold)} − selling ${fmt(sell)}.) Max Allowable Offer by the 70% rule is ${fmt(arv*0.7-rep)}.`;
  }

  return null; // no computed intent — defer to semantic / keyword retrieval
}

/* ---- offline KB retrieval: whole-word keyword overlap (instant, model-free) ----
   Word-boundary match so e.g. "ac" doesn't false-match inside "place". */
function keywordKB(qRaw){
  const words = new Set((qRaw.toLowerCase().match(/[a-z0-9]+/g)) || []);
  let best = null;
  KB.forEach(e => {
    const score = e.k.reduce((s,kw) => s + (words.has(kw) ? 1 : 0), 0);
    if (score > 0 && (!best || score > best.score)) best = { score, a: e.a };
  });
  return best ? best.a : null;
}
const COPILOT_FALLBACK = 'I don\'t have a confident answer for that — I\'m an offline assistant focused on this walkthrough. I can help with the running total, your biggest cost, what\'s left to review, the deal/profit math, or a repair area like HVAC, roof, foundation, electrical, kitchen, bath, flooring, or exterior.';

/* ---- offline semantic engine — Transformers.js + all-MiniLM-L6-v2 (lazy) ----
   Upgrades KB retrieval from keyword overlap to on-device sentence embeddings,
   so any phrasing maps to the right guidance. Runs 100% on-device; the model +
   runtime are cached by the service worker, so it works offline after the first
   load. Falls back silently to keyword matching if it can't load (no signal on
   first use, or no WASM support). */
const SEM = { state:'idle', extractor:null, embed:null, vecs:null }; // idle|loading|ready|failed
const SEM_THRESHOLD = 0.25; // cosine sim below this → treat as off-topic
async function ensureSemantic(){
  if (SEM.state === 'ready')  return true;
  if (SEM.state === 'failed') return false;
  if (SEM.state === 'loading')
    return new Promise(res => { const t = setInterval(() => { if (SEM.state !== 'loading') { clearInterval(t); res(SEM.state === 'ready'); } }, 200); });
  SEM.state = 'loading';
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
    mod.env.allowLocalModels = false;
    SEM.extractor = await mod.pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
    SEM.embed = async (t) => Array.from((await SEM.extractor(t, { pooling:'mean', normalize:true })).data);
    SEM.vecs = [];
    for (const e of KB) SEM.vecs.push(await SEM.embed(e.k.join(', ') + '. ' + e.a)); // embed corpus once
    SEM.state = 'ready';
    return true;
  } catch (err) {
    console.warn('Offline semantic engine unavailable — using keyword retrieval:', err);
    SEM.state = 'failed';
    return false;
  }
}
async function semanticKB(qRaw){
  if (SEM.state !== 'ready') return null;
  const qv = await SEM.embed(qRaw);
  let best = null;
  SEM.vecs.forEach((v, i) => { let s = 0; for (let k = 0; k < v.length; k++) s += qv[k] * v[k]; if (!best || s > best.s) best = { s, a: KB[i].a }; });
  return best;
}

/* ---- resolver: computed intent → semantic KB → keyword KB → honest fallback ---- */
async function answerQuery(q){
  const c = computedAnswer(q);
  if (c != null) return c;
  if (await ensureSemantic()){
    // engine loaded: a below-threshold score means it's genuinely off-topic
    const best = await semanticKB(q);
    return (best && best.s >= SEM_THRESHOLD) ? best.a : COPILOT_FALLBACK;
  }
  // engine unavailable (offline first use / no WASM) → keyword fallback
  const kw = keywordKB(q);
  return kw != null ? kw : COPILOT_FALLBACK;
}
/* sync, model-free path (instant offline answers + non-chat callers) */
function assistantAnswer(q){
  const c = computedAnswer(q);
  if (c != null) return c;
  const kw = keywordKB(q);
  return kw != null ? kw : COPILOT_FALLBACK;
}

/* =========================================================
   Backendless handoff: share an estimate by link / QR.
   The estimate (minus photos) is compressed into the URL hash;
   opening that link on any device imports it. No server.
   ========================================================= */
function loadScript(src){ return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
async function ensureLZ(){ if (!window.LZString) await loadScript('https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js'); }
async function ensureQR(){ if (!window.qrcode) await loadScript('https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js'); }
function shareUrl(p){
  const slim = { v:1, name:p.name, address:p.address, rooms:p.rooms, cells:p.cells, nan:p.nan, priceOverrides:p.priceOverrides, deal:p.deal };
  return location.origin + location.pathname + '#import=' + LZString.compressToEncodedURIComponent(JSON.stringify(slim));
}
function projectFromShare(d){
  return { id:'p'+Date.now().toString(36), name:d.name||'Imported estimate', address:d.address||'',
    createdAt:new Date().toISOString(), savedAt:new Date().toISOString(),
    rooms:d.rooms||[], cells:d.cells||{}, nan:d.nan||{}, priceOverrides:d.priceOverrides||{}, photos:[],
    deal:d.deal||{ arv:'', purchase:'', weeks:8, perWeek:350, sellPct:8 } };
}
async function handleImport(){
  const m = location.hash.match(/import=([^&]+)/); if (!m) return false;
  try {
    await ensureLZ();
    const data = JSON.parse(LZString.decompressFromEncodedURIComponent(m[1]));
    const np = projectFromShare(data);
    projects.push(np); setLS(LS.projects, projects);
    history.replaceState(null, '', location.pathname);
    P = np; setLS(LS.current, np.id);
    return true;
  } catch (e) { history.replaceState(null, '', location.pathname); return false; }
}
async function modalShare(){
  modal(`<div class="px-5 pb-8 pt-2 text-center">
    <h3 class="font-bold text-lg mb-1">Share estimate</h3>
    <p class="text-[12px] text-gray-400 mb-3">Scan on another phone, or copy the link. No server involved. Photos are not included in the link.</p>
    <div id="qrBox" class="flex justify-center my-3 min-h-[210px] items-center"><span class="text-gray-400 text-sm">Preparing…</span></div>
    <input id="shareLink" readonly value="" class="w-full text-[11px] text-gray-500 bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 mb-2 text-center" />
    <button data-m="copylink" class="press w-full py-3 bg-spark text-white rounded-xl font-bold">Copy link</button>
    <div id="shareNote" class="text-[11px] text-gray-400 mt-2"></div>
  </div>`);
  const box = () => document.getElementById('qrBox');
  // Step 1: the link itself only needs the compression lib.
  try { await ensureLZ(); }
  catch (e) { if (box()) box().innerHTML = '<span class="text-gray-400 text-sm px-6">Sharing needs to be online once to load. Try again with a connection.</span>'; return; }
  const url = shareUrl(P); window.__shareUrl = url;
  const linkEl = document.getElementById('shareLink'); if (linkEl) linkEl.value = url;
  const note = document.getElementById('shareNote'); if (note) note.textContent = (url.length/1024).toFixed(1) + ' KB link';
  // Step 2: the QR is a bonus — if it fails, the link above still works.
  try {
    await ensureQR();
    const qr = qrcode(0, 'L'); qr.addData(url); qr.make();
    if (box()) {
      box().innerHTML = qr.createImgTag(4, 8);
      const img = box().querySelector('img');
      if (img) { img.removeAttribute('width'); img.removeAttribute('height'); img.style.cssText = 'width:220px;height:220px;image-rendering:pixelated;border-radius:8px'; img.alt = 'estimate QR code'; }
    }
  } catch (e) {
    if (box()) box().innerHTML = '<span class="text-gray-400 text-sm px-6">QR unavailable here — use the link below.</span>';
  }
}

/* ---- Branded client report: a print / save-as-PDF document ---- */
function clientReport(){
  const d = P.deal, repairs = grandTotal();
  const arv=+d.arv||0, pur=+d.purchase||0, hold=(+d.weeks||0)*(+d.perWeek||0), sell=arv*((+d.sellPct||0)/100);
  const tc=pur+repairs+hold+sell, profit=arv-tc, roi=tc>0?profit/tc*100:0, mao=arv*0.7-repairs, hasDeal=!!(arv&&pur);
  let verdict='', vcolor='#64748b';
  if (hasDeal){ if(profit>=25000&&roi>=15){verdict='GO';vcolor='#16a34a';} else if(profit>0){verdict='CAUTION';vcolor='#d97706';} else {verdict='NO-GO';vcolor='#dc2626';} }
  const pr=progress();
  const sections={}; P.rooms.forEach(r=>{const s=ROOM_TYPES[r.type].section; sections[s]=(sections[s]||0)+roomTotal(r.id);});
  const secRows=Object.entries(sections).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxSec=Math.max(1,...secRows.map(([,v])=>v));
  const roomBlocks=P.rooms.map(r=>{
    const items=[];
    ROOM_TYPES[r.type].groups.forEach(g=>groupItemIds(g).forEach(id=>{const lt=lineTotal(r.id,g,id); if(lt>0){const c=P.cells[cellKey(r.id,g,id)]; const it=itemById(id); items.push(`<tr><td>${esc(it?it.name:id)}</td><td class="r">${c.q} ${esc(it?it.unit:'')}</td><td class="r">${fmt(lt)}</td></tr>`);}}));
    if(!items.length) return '';
    return `<div class="room"><div class="roomhd"><span>${esc(r.name)}</span><span>${fmt(roomTotal(r.id))}</span></div><table class="items">${items.join('')}</table></div>`;
  }).join('');
  const photos=P.photos.length?`<div class="photos">${P.photos.map(ph=>`<div class="ph"><img src="${ph.data}"/>${ph.caption?`<div class="cap">${esc(ph.caption)}</div>`:''}${ph.serial&&ph.serial!=='(none found)'?`<div class="sn">SN: ${esc(ph.serial)}</div>`:''}</div>`).join('')}</div>`:'';

/* ---- Compare estimates: rank properties to decide which to pursue ---- */
function modalCompare(){
  if (!projects.length){ toast('No estimates to compare'); return; }
  const sP = P;
  const rows = projects.map(p => {
    P = p;
    const repairs = grandTotal();
    const d = p.deal, arv = +d.arv || 0, pur = +d.purchase || 0;
    const hold = (+d.weeks||0)*(+d.perWeek||0), sell = arv*((+d.sellPct||0)/100);
    const tc = pur + repairs + hold + sell, profit = arv - tc, roi = tc > 0 ? profit/tc*100 : 0;
    const pr = progress();
    let verdict = 'No deal', vc = 'bg-gray-100 text-gray-500';
    const hasDeal = !!(arv && pur);
    if (hasDeal){ if (profit>=25000 && roi>=15){ verdict='GO'; vc='bg-green-100 text-green-700'; } else if (profit>0){ verdict='CAUTION'; vc='bg-amber-100 text-amber-700'; } else { verdict='NO-GO'; vc='bg-red-100 text-red-700'; } }
    return { p, repairs, profit, roi, verdict, vc, hasDeal, done: pr.done, total: pr.total };
  });
  P = sP;
  rows.sort((a,b) => (b.hasDeal - a.hasDeal) || (b.profit - a.profit));
  const best = rows.find(r => r.hasDeal && r.verdict === 'GO') || (rows[0].hasDeal ? rows[0] : null);
  modal(`<div class="px-5 pb-8 pt-2">
    <h3 class="font-bold text-lg mb-1">Compare estimates</h3>
    <p class="text-[12px] text-gray-400 mb-3">Ranked by projected profit. ${best ? `Top pick: <span class="font-semibold text-green-600">${esc(best.p.name)}</span>.` : 'Add ARV and purchase price on the Deal tab to rank by profit.'}</p>
    <div class="space-y-2">
      ${rows.map((r,i) => `
        <button data-m="open" data-id="${r.p.id}" class="press w-full text-left rounded-xl border ${i===0 && r.hasDeal ? 'border-spark bg-spark-50' : 'border-gray-200'} p-3">
          <div class="flex items-center justify-between gap-2">
            <div class="font-semibold truncate flex-1">${i===0 && r.hasDeal ? '⭐ ' : ''}${esc(r.p.name)}</div>
            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${r.vc} flex-shrink-0">${r.verdict}</span>
          </div>
          <div class="grid grid-cols-3 gap-1 mt-2 text-center">
            <div><div class="text-[10px] text-gray-400">Repairs</div><div class="font-semibold text-[13px]">${fmt(r.repairs)}</div></div>
            <div><div class="text-[10px] text-gray-400">Profit</div><div class="font-semibold text-[13px] ${r.hasDeal ? (r.profit>0?'text-green-600':'text-red-500') : 'text-gray-300'}">${r.hasDeal ? fmt(r.profit) : '—'}</div></div>
            <div><div class="text-[10px] text-gray-400">Return</div><div class="font-semibold text-[13px] ${r.hasDeal ? '' : 'text-gray-300'}">${r.hasDeal ? r.roi.toFixed(0)+'%' : '—'}</div></div>
          </div>
        </button>`).join('')}
    </div>
  </div>`);
}

/* =====================================================================
   11. EVENT BINDING
   ===================================================================== */
function on(act, fn) { return el => el.addEventListener(act === 'input' ? 'input' : 'click', fn); }

function bind() {
  $app.querySelectorAll('[data-act]').forEach(el => {
    const a = el.dataset.act;
    if (a === 'qtyin' || a === 'cap') {
      el.addEventListener('change', handle);
      el.addEventListener('click', e => e.stopPropagation());
    } else if (a === 'deal') {
      el.addEventListener('input', handle);
    } else if (a === 'addphoto') {
      el.addEventListener('change', handle);
    } else {
      el.addEventListener('click', handle);
    }
  });
  const ci = document.getElementById('chatin');
  if (ci) ci.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendChat(); } });
  const log = document.getElementById('chatlog');
  if (log) log.scrollTop = log.scrollHeight;
}
function bindModal() {
  $modal.querySelectorAll('[data-m]').forEach(el => el.addEventListener('click', handleModal));
}

function handle(e) {
  const el = e.currentTarget; const a = el.dataset.act; const d = el.dataset;
  switch (a) {
    case 'new': modalNewEstimate(); break;
    case 'open': openProject(d.id); break;
    case 'projects': modalProjects(); break;
    case 'tab': UI.tab = d.tab; render(); break;
    case 'room': selectRoom(d.id); break;
    case 'addroom': modalAddRoom(); break;
    case 'delroom': confirmDel('Remove this room and its selections?', () => removeRoom(d.id)); break;
    case 'grp': UI.openGroups[d.k] = !UI.openGroups[d.k]; render(); break;
    case 'nan': toggleNan(d.k, el.checked); break;
    case 'chk': toggleCheck(d.r, d.g, d.i); break;
    case 'qty': stepQty(d.r, d.g, d.i, +d.d); break;
    case 'qtyin': setQty(d.r, d.g, d.i, el.value); break;
    case 'price': modalPrice(d.i); break;
    case 'additem': modalAddItem(d.g); break;
    case 'delitem': confirmDel('Delete this line item from the catalog?', () => deleteItem(d.i)); break;
    case 'addphoto': addPhotos(el.files); break;
    case 'live': startLive(); break;
    case 'capmic': voiceInput('cap_' + d.id); break;
    case 'cap': setCaption(d.id, el.value); break;
    case 'ocr': runOCR(d.id); break;
    case 'delphoto': delPhoto(d.id); break;
    case 'deal': P.deal[d.k] = el.value; saveSoon(); softUpdateDeal(); break;
    case 'export': doExport(); break;
    case 'delproj': confirmDel('Delete this estimate permanently?', () => delProject(d.id)); break;
    case 'globalprice': modalGlobalPrice(); break;
    case 'rec': applyRec(d.r, d.g, d.i); break;
    case 'chatsend': sendChat(); break;
    case 'chip': document.getElementById('chatin').value = d.q; sendChat(); break;
    case 'chatmic': voiceInput('chatin'); break;
    case 'dismissvoicehint': dismissVoiceHint(); render(); break;
    case 'voicewalk': startVoiceWalk(); break;
    case 'dark': toggleDark(); break;
    case 'compare': modalCompare(); break;
    case 'share': modalShare(); break;
    case 'report': clientReport(); break;
  }
}

/* ---------- copilot actions ---------- */
function applyRec(r, g, i) {
  P.cells[cellKey(r, g, i)] = { q: 1 };
  if (P.nan[nanKey(r, g)]) delete P.nan[nanKey(r, g)];
  save(); render(); toast(itemById(i).name + ' added');
}
async function sendChat() {
  const el = document.getElementById('chatin'); if (!el) return;
  const q = el.value.trim(); if (!q) return;
  CHAT.push({ role: 'user', text: q });
  // typing placeholder — note the one-time model warm-up the first time it's needed
  const warming = SEM.state === 'idle' && computedAnswer(q) == null;
  CHAT.push({ role: 'bot', text: warming ? 'Warming up the offline AI (one-time download)…' : 'Thinking…', _typing: true });
  if (CHAT.length > 40) CHAT = CHAT.slice(-40);
  render();
  let ans;
  try { ans = await answerQuery(q); } catch (e) { ans = assistantAnswer(q); }
  const i = CHAT.findIndex(m => m._typing); if (i >= 0) CHAT.splice(i, 1);
  CHAT.push({ role: 'bot', text: ans });
  if (CHAT.length > 40) CHAT = CHAT.slice(-40);
  render();
  const log = document.getElementById('chatlog'); if (log) log.scrollTop = log.scrollHeight;
  document.getElementById('chatin')?.focus();
}
/* Web Speech API dictation (graceful fallback when unsupported) */
let _rec = null;
function voiceInput(targetId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice input isn\'t supported in this browser — try Chrome, or just type.', 4500); return; }
  if (_rec) { try { _rec.stop(); } catch (e) {} _rec = null; return; } // tap again while listening → stop
  const rec = new SR(); _rec = rec;
  rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 1;
  const btn = targetId === 'chatin'
    ? document.querySelector('[data-act="chatmic"]')
    : document.querySelector('[data-act="capmic"][data-id="' + targetId.slice(4) + '"]');
  const listening = on => { if (btn) { btn.classList.toggle('bg-gray-100', !on); btn.classList.toggle('bg-red-500', on); btn.classList.toggle('animate-pulse', on); } };
  rec.onstart = () => { listening(true); dismissVoiceHint(); toast('Listening… speak now', 3000); };
  rec.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const el = document.getElementById(targetId);
    if (el) { el.value = (el.value ? el.value + ' ' : '') + txt; el.focus(); }
    if (targetId === 'chatin') sendChat();
    else if (targetId.startsWith('cap_')) { setCaption(targetId.slice(4), el.value); toast('Caption: ' + txt); }
  };
  rec.onerror = (e) => {
    const msg = {
      'not-allowed': 'Microphone blocked. Tap the lock / “aA” icon in the address bar → allow Microphone, then retry.',
      'service-not-allowed': 'Microphone blocked. Allow mic access in your browser settings, then retry.',
      'no-speech': 'Didn\'t catch anything — tap the mic and speak clearly.',
      'audio-capture': 'No microphone found on this device.',
      'network': 'Voice needs a connection — speech is processed online.',
      'aborted': ''
    }[e.error] || 'Voice input failed — type your question instead.';
    if (msg) toast(msg, 5000);
  };
  rec.onend = () => { listening(false); _rec = null; };
  try { rec.start(); } catch (e) { listening(false); _rec = null; toast('Voice unavailable — type instead.', 3000); }
}
function handleModal(e) {
  const el = e.currentTarget; const m = el.dataset.m; const d = el.dataset;
  switch (m) {
    case 'new': modalNewEstimate(); break;
    case 'createest': createEstimate(document.getElementById('newAddr') ? document.getElementById('newAddr').value : ''); break;
    case 'createskip': createEstimate(''); break;
    case 'open': closeModal(); openProject(d.id); break;
    case 'home': closeModal(); P = null; setLS(LS.current,''); render(); break;
    case 'rename': renameProject(); break;
    case 'room': closeModal(); addRoom(P, d.t); break;
    case 'priceProj': savePrice(d.i, 'project'); break;
    case 'priceGlobal': savePrice(d.i, 'global'); break;
    case 'priceReset': resetPrice(d.i); break;
    case 'saveitem': saveCustomItem(d.g); break;
    case 'resetGlobal': delete GLOBAL.prices[d.i]; saveGlobal(); modalGlobalPrice(); toast('Reset'); break;
    case 'copylink': { const u = window.__shareUrl || ''; const inp = document.getElementById('shareLink');
      if (navigator.clipboard && u) navigator.clipboard.writeText(u).then(() => toast('Link copied ✓'), () => { if (inp){ inp.focus(); inp.select(); } toast('Select the link and copy'); });
      else if (inp){ inp.focus(); inp.select(); toast('Select the link and copy'); } else toast('Copy not available'); break; }
  }
}

/* ---------- action helpers ---------- */
function toggleCheck(r, g, i) {
  const k = cellKey(r, g, i);
  if (P.cells[k]) delete P.cells[k];
  else { P.cells[k] = { q: 1 }; if (P.nan[nanKey(r,g)]) delete P.nan[nanKey(r,g)]; }
  save(); render();
}
function toggleNan(k, on) {
  if (on) {
    P.nan[k] = true;
    // clear any checked items in that group
    Object.keys(P.cells).forEach(ck => { if (ck.startsWith(k + '|')) delete P.cells[ck]; });
  } else delete P.nan[k];
  save(); render();
}
function stepQty(r, g, i, dlt) {
  const k = cellKey(r, g, i); const c = P.cells[k] || { q: 1 };
  c.q = Math.max(0, Math.round(((c.q || 1) + dlt) * 100) / 100);
  P.cells[k] = c; save(); render();
}
function setQty(r, g, i, val) {
  const k = cellKey(r, g, i); const n = parseFloat(val);
  P.cells[k] = { q: isNaN(n) ? 0 : Math.max(0, n) }; save(); render();
}
function savePrice(id, scope) {
  const v = parseFloat(document.getElementById('priceInput').value);
  if (isNaN(v) || v < 0) { toast('Enter a valid price'); return; }
  if (scope === 'project') { P.priceOverrides[id] = v; save(); }
  else { GLOBAL.prices[id] = v; saveGlobal(); }
  closeModal(); render(); toast(scope === 'global' ? 'Standard price updated' : 'Price set for project');
}
function resetPrice(id) { delete P.priceOverrides[id]; delete GLOBAL.prices[id]; save(); saveGlobal(); closeModal(); render(); toast('Reset to default'); }
function saveCustomItem(gid) {
  const name = document.getElementById('ci_name').value.trim();
  const cost = parseFloat(document.getElementById('ci_cost').value);
  const unit = document.getElementById('ci_unit').value.trim() || 'ea.';
  if (!name) { toast('Enter a name'); return; }
  if (isNaN(cost) || cost < 0) { toast('Enter a valid cost'); return; }
  const id = 'cu-' + Date.now().toString(36);
  GLOBAL.custom.push({ id, name, cost, unit, groupId: gid }); saveGlobal();
  closeModal(); render(); toast('Item added');
}
function deleteItem(id) {
  if (!GLOBAL.deleted.includes(id)) GLOBAL.deleted.push(id);
  GLOBAL.custom = GLOBAL.custom.filter(c => c.id !== id);
  saveGlobal();
  // purge from every project cell
  Object.keys(P.cells).forEach(k => { if (k.endsWith('|' + id)) delete P.cells[k]; });
  save(); render(); toast('Item deleted');
}
function renameProject() {
  const name = prompt('Property address / estimate name', P.name);
  if (name && name.trim()) { P.name = name.trim(); if (!P.address) P.address = name.trim(); save(); closeModal(); render(); }
}
function delProject(id) {
  projects = projects.filter(p => p.id !== id);
  setLS(LS.projects, projects);
  if (P && P.id === id) { P = null; setLS(LS.current, ''); }
  render();
}
function softUpdateDeal() {
  // lightweight: re-render only the deal view to keep inputs focused
  if (UI.tab !== 'deal') return;
  clearTimeout(softUpdateDeal._t);
  softUpdateDeal._t = setTimeout(() => {

/* ---------- photos ---------- */
function addPhotos(files) {
  if (!files || !files.length) return;
  let pending = files.length, added = 0;
  const done = () => { if (--pending === 0) { save(); render(); toast(added ? (added > 1 ? added + ' photos added' : 'Photo added') : 'Could not read that photo'); } };
  [...files].forEach(f => {
    if (!/^image\//.test(f.type)) { toast('That file is not an image'); done(); return; }
    const reader = new FileReader();
    reader.onload = () => {
      compress(reader.result, 1280, 0.7).then(data => {
        if (!setLS('__probe__', data.length)) { toast('Storage full — delete some photos first', 4000); done(); return; }
        localStorage.removeItem('__probe__');
        P.photos.push({ id: 'ph' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), data, caption: '', serial: '' });
        added++; done();
      }).catch(() => { toast('Could not process that photo'); done(); });
    };
    reader.onerror = () => { toast('Could not read that photo'); done(); };
    reader.readAsDataURL(f);
  });
}
function compress(dataUrl, maxW, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = img.width * scale; c.height = img.height * scale;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = () => res(dataUrl);
    img.src = dataUrl;
  });
}
function setCaption(id, v) { const ph = P.photos.find(p => p.id === id); if (ph) { ph.caption = v; save(); } }
function delPhoto(id) { P.photos = P.photos.filter(p => p.id !== id); save(); render(); }

/* =========================================================
   AI defect / scope detection from a camera frame.
   Offline now: on-device zero-shot image classification
   (Transformers.js + CLIP) scores the frame against labels
   tied to line items. Designed so an online vision model can
   slot into suggestScope() later for higher accuracy.
   ========================================================= */
// label (CLIP prompt) -> line item it implies, and where it belongs.
// Entries with item:null are DECOYS (good-condition or irrelevant scenes). They
// give the model a correct "nothing to do" option to land on, which is what
// stops it forcing a defect label (e.g. a wood floor matching "carpet").
const VISION_LABELS = [
  // fixtures / appliances (most reliable)
  { prompt:'a refrigerator',                       item:'kt-17', room:'kitchen',  group:'appliances' },
  { prompt:'a kitchen stove or oven range',        item:'kt-13', room:'kitchen',  group:'appliances' },
  { prompt:'a dishwasher',                         item:'kt-16', room:'kitchen',  group:'appliances' },
  { prompt:'a toilet',                             item:'ba-04', room:'bathroom', group:'vanity' },
  { prompt:'a bathroom vanity with a sink',        item:'ba-03', room:'bathroom', group:'vanity' },
  { prompt:'a bathtub or shower',                  item:'ba-07', room:'bathroom', group:'tub' },
  { prompt:'a furnace or HVAC air handler',        item:'as-01', room:'systems',  group:'hvac' },
  { prompt:'a water heater tank',                  item:'as-08', room:'systems',  group:'plumbing' },
  { prompt:'a ceiling light fixture',              item:'ig-22', room:'interior', group:'lighting' },
  { prompt:'a garage door',                        item:'ex-21', room:'exterior', group:'garage' },
  { prompt:'a wooden privacy fence',               item:'ex-03', room:'exterior', group:'fence' },
  // defects (coarse — gated hard below)
  { prompt:'old worn or stained carpet that needs replacing', item:'ig-06', room:'interior', group:'flooring' },
  { prompt:'cracked or damaged wall or floor tile',item:'ba-05', room:'bathroom', group:'btile' },
  { prompt:'a water stained or water damaged ceiling', item:'ig-08', room:'interior', group:'paint' },
  { prompt:'peeling or damaged exterior paint',    item:'ex-07', room:'exterior', group:'siding' },
  { prompt:'worn or damaged kitchen cabinets',     item:'kt-05', room:'kitchen',  group:'cabinets' },
  // decoys — correct "no action" / irrelevant classes (item:null)
  { prompt:'a clean hardwood wood floor in good condition', item:null },
  { prompt:'a clean tile floor in good condition',          item:null },
  { prompt:'a luxury vinyl plank floor in good condition',  item:null },
  { prompt:'a plain wall in good condition',                item:null },
  { prompt:'a clean undamaged ceiling',                     item:null },
  { prompt:'kitchen cabinets in good condition',            item:null },
  { prompt:'an empty room',                                 item:null },
  { prompt:'a person',                                      item:null },
  { prompt:'the outdoors, trees or sky',                    item:null },
  { prompt:'a blurry or dark photo of nothing',             item:null }
];

const VISION = { state:'idle', clf:null, online:false }; // online=true would route to suggestScopeOnline()
async function ensureVision(){
  if (VISION.state === 'ready')  return true;
  if (VISION.state === 'failed') return false;
  if (VISION.state === 'loading')
    return new Promise(res => { const t = setInterval(() => { if (VISION.state !== 'loading') { clearInterval(t); res(VISION.state === 'ready'); } }, 200); });
  VISION.state = 'loading';
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
    mod.env.allowLocalModels = false;
    VISION.clf = await mod.pipeline('zero-shot-image-classification', 'Xenova/clip-vit-base-patch32');
    VISION.state = 'ready';
    return true;
  } catch (err) {
    console.warn('On-device vision unavailable:', err);
    VISION.state = 'failed';
    return false;
  }
}

/* dispatcher: online vision model when configured, else offline CLIP */
async function suggestScope(dataUrl){
  if (VISION.online) { try { return await suggestScopeOnline(dataUrl); } catch (e) { /* fall through */ } }
  return await suggestScopeOffline(dataUrl);
}
/* C-later seam: send the frame + price list to a vision LLM for accurate,
   reasoned suggestions. Left unconfigured so the app stays offline by default. */
async function suggestScopeOnline(dataUrl){ throw new Error('online vision not configured'); }

async function suggestScopeOffline(dataUrl){
  if (!(await ensureVision())) return { error: 'unavailable' };
  const FLOOR = 0.28; // min confidence for an actionable suggestion
  const labels = VISION_LABELS.map(l => 'a photo of ' + l.prompt);
  const res = await VISION.clf(dataUrl, labels); // sorted desc by score
  const ranked = res.map(r => ({ ...VISION_LABELS[labels.indexOf(r.label)], score: r.score }));
  // Gate 1: if the single most likely label is a decoy (good condition /
  // irrelevant), the scene needs no action — suggest nothing.
  if (!ranked[0] || !ranked[0].item) return { suggestions: [] };
  // Gate 2: surface only actionable labels clearly above the floor (max 2).
  const out = ranked.filter(r => r.item && itemById(r.item) && r.score >= FLOOR).slice(0, 2);
  return { suggestions: out };
}

/* shared: add a line item to the first room of a type (creating it if absent) */
function addLineToRoomType(itemId, roomType, groupId, qty){
  let room = P.rooms.find(r => r.type === roomType);
  if (!room) { addRoom(P, roomType, true); room = P.rooms.find(r => r.type === roomType); }
  if (!room) return null;
  P.cells[cellKey(room.id, groupId, itemId)] = { q: qty || 1 };
  if (P.nan[nanKey(room.id, groupId)]) delete P.nan[nanKey(room.id, groupId)];
  save();
  return room;
}
function applyVisionSuggestion(item, roomType, group){
  const room = addLineToRoomType(item, roomType, group, 1);
  if (room) toast((itemById(item) ? itemById(item).name : 'Item') + ' added to ' + room.name);
}

/* item -> its group and home room type (precomputed for voice/vision placement) */
const ITEM_GROUP = {}; Object.entries(GROUPS).forEach(([gid,g]) => g.ids.forEach(id => { if (ITEM_GROUP[id] == null) ITEM_GROUP[id] = gid; }));
const GROUP_ROOMTYPE = {}; Object.entries(ROOM_TYPES).forEach(([t,rt]) => rt.groups.forEach(g => { if (GROUP_ROOMTYPE[g] == null) GROUP_ROOMTYPE[g] = t; }));
function groupOf(id){ return ITEM_GROUP[id] || (GLOBAL.custom.find(c => c.id === id) || {}).groupId; }

/* =========================================================
   Hands-free Voice Walkthrough.
   The agent narrates repairs; we transcribe (Web Speech API),
   split into phrases, semantically map each to a line item
   (reusing the on-device embedding model), infer the room,
   extract a quantity, and add it live with an undo feed.
   ========================================================= */
const VOICE = { vecs:null, room:null };
const NUMWORDS = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10 };
const ROOM_KEYWORDS = [
  [/\b(kitchen)\b/, 'kitchen'],
  [/\b(bath|bathroom|powder room|shower room|restroom)\b/, 'bathroom'],
  [/\b(bedroom|master|guest room)\b/, 'bedroom'],
  [/\b(living|family|den|common|dining|lounge)\b/, 'living'],
  [/\b(exterior|outside|outdoor|yard|fence|garage|roof|siding|gutter|landscap|driveway)\b/, 'exterior'],
  [/\b(system|hvac|furnace|a\/c|air condition|electrical|wiring|panel|plumbing|water heater|foundation|structural|insulation)\b/, 'systems'],
  [/\b(interior|hallway|\bhall\b|whole house|general|stairs|stairway|entry|foyer)\b/, 'interior']
];
function detectRoomType(text){ for (const [re,t] of ROOM_KEYWORDS) if (re.test(text)) return t; return null; }
function parseQty(text){
  const m = text.match(/\b(\d{1,5})\b/); if (m) return Math.max(1, +m[1]);
  for (const w in NUMWORDS) if (new RegExp('\\b' + w + '\\b').test(text)) return NUMWORDS[w];
  return 1;
}
async function ensureVoiceIndex(){
  if (VOICE.vecs) return true;
  if (!(await ensureSemantic())) return false;
  VOICE.vecs = [];
  for (const it of catalog()) VOICE.vecs.push({ id: it.id, vec: await SEM.embed(it.name) });
  return true;
}
/* parse one spoken phrase -> add a line item (or report no match) */
const ROOM_WORDS = /\b(kitchen|bathroom|bath|powder|shower|restroom|bedroom|master|guest|living|family|den|common|dining|lounge|exterior|outside|outdoor|yard|garage|interior|hallway|hall|foyer|entry|room)\b/g;
const STOP = new Set('the a an and or is are it its on in at of to for with new old need needs needed replace replaced install installed add put get got this that here there look looks looking bad broken damage damaged damages fix some please all both also then they we want some'.split(' '));
/* spoken-word -> item-name token, for terms that differ from the catalog wording */
const SYNONYMS = { ac:'condensing', air:'condensing', conditioner:'condensing', condenser:'condensing',
  fridge:'fridge', refrigerator:'fridge', stove:'range', oven:'oven', microwave:'microwave', hood:'hood',
  plug:'outlets', plugs:'outlets', outlet:'outlets', socket:'outlets', breaker:'panel', rewire:'rewire',
  gutters:'guttering', gutter:'guttering', roofing:'roof', faucet:'sink', countertop:'granite', counters:'granite', counter:'granite',
  lights:'light', lighting:'light', cabinet:'cabinets', flooring:'floor', floors:'floor', windows:'window', doors:'door' };
/* instant keyword match against item names — works with no model, no network */
function matchItemFromText(t){
  const words = (t.toLowerCase().match(/[a-z]+/g) || []).filter(w => w.length > 2 && !STOP.has(w));
  if (!words.length) return null;
  const ws = new Set(words);
  words.forEach(w => { if (SYNONYMS[w]) ws.add(SYNONYMS[w]); });
  let best = null;
  catalog().forEach(it => {
    // ignore parenthetical qualifiers like "(needed if no window)" so they don't false-match
    const toks = (it.name.toLowerCase().replace(/\([^)]*\)/g, ' ').match(/[a-z]+/g) || []).filter(w => w.length > 2 && !STOP.has(w));
    let hits = 0; toks.forEach(tk => { if (ws.has(tk)) hits++; });
    if (hits > 0){ const score = hits + hits / Math.max(toks.length, 1); if (!best || score > best.score) best = { score, hits, id: it.id }; }
  });
  return best;
}
async function processVoicePhrase(text){
  const t = (text || '').toLowerCase().trim(); if (!t) return null;
  const mentioned = detectRoomType(t); if (mentioned) VOICE.room = mentioned;
  // if the phrase is essentially just a room name, only set context (don't add an item)
  let phraseForMatch = t;
  if (mentioned){
    const residual = t.replace(ROOM_WORDS, ' ').replace(/\b(the|a|an|in|on|is|are|of|please|some|need|needs|new)\b/g, ' ').replace(/\s+/g, ' ').trim();
    if (residual.length < 3) return { phrase: t, matched: false, roomOnly: true };
    phraseForMatch = residual;
  }
  // 1) instant keyword match (no model dependency)
  let id = null;
  const kw = matchItemFromText(phraseForMatch);
  if (kw && kw.hits >= 1) id = kw.id;
  // 2) fuzzy semantic fallback only if keyword missed and the model is loaded
  if (!id && await ensureVoiceIndex()){
    const qv = await SEM.embed(phraseForMatch);
    let best = null;
    VOICE.vecs.forEach(v => { let s = 0; for (let i = 0; i < v.vec.length; i++) s += qv[i] * v.vec[i]; if (!best || s > best.s) best = { s, id: v.id }; });
    if (best && best.s >= 0.42) id = best.id; // stricter: avoid forcing a wrong item when unsure
  }
  if (!id) return { phrase: t, matched: false };
  const group = groupOf(id); if (!group) return { phrase: t, matched: false };
  let roomType = VOICE.room || GROUP_ROOMTYPE[group];
  if (!ROOM_TYPES[roomType] || !ROOM_TYPES[roomType].groups.includes(group)) roomType = GROUP_ROOMTYPE[group];
  const qty = parseQty(t);
  const room = addLineToRoomType(id, roomType, group, qty);
  if (!room) return { phrase: t, matched: false };
  return { phrase: t, matched: true, id, group, roomId: room.id, name: itemById(id) ? itemById(id).name : id, room: room.name, qty };
}

/* Pull EVERY item mentioned in one utterance (not just the single best match),
   so "kitchen, new cabinets, a range and a toilet" adds all of them. Fast,
   keyword-based, no model needed. */
function extractItems(t){
  const cleaned = t.toLowerCase().replace(ROOM_WORDS, ' '); // room words are context, not items
  const words = (cleaned.match(/[a-z]+/g) || []).filter(w => w.length > 2 && !STOP.has(w));
  const expanded = new Set(); words.forEach(w => { expanded.add(w); if (SYNONYMS[w]) expanded.add(SYNONYMS[w]); });
  const out = [], used = new Set();
  expanded.forEach(w => {
    let best = null;
    catalog().forEach(it => {
      const toks = (it.name.toLowerCase().replace(/\([^)]*\)/g, ' ').match(/[a-z]+/g) || []).filter(x => x.length > 2 && !STOP.has(x));
      const idx = toks.indexOf(w);
      if (idx >= 0){ const score = (idx === 0 ? 2 : 1) + 1 / Math.max(toks.length, 1); if (!best || score > best.score) best = { score, id: it.id }; }
    });
    if (best && !used.has(best.id)){ used.add(best.id); out.push(best.id); }
  });
  return out;
}
async function processSpeech(raw){
  const t = (raw || '').toLowerCase().trim(); if (!t) return [];
  const mentioned = detectRoomType(t); if (mentioned) VOICE.room = mentioned;
  const results = [];
  for (const id of extractItems(t)){
    const group = groupOf(id); if (!group) continue;
    let roomType = VOICE.room || GROUP_ROOMTYPE[group];
    if (!ROOM_TYPES[roomType] || !ROOM_TYPES[roomType].groups.includes(group)) roomType = GROUP_ROOMTYPE[group];
    const room = addLineToRoomType(id, roomType, group, 1);
    if (room) results.push({ matched: true, id, group, roomId: room.id, name: itemById(id) ? itemById(id).name : id, room: room.name, qty: 1, phrase: raw });
  }
  if (!results.length && !mentioned) results.push({ matched: false, phrase: raw });
  return results;
}

let _vrec = null;
function startVoiceWalk(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  VOICE.room = null;
  const feed = [];
  const ov = document.createElement('div');
  ov.id = 'voiceWalk';
  ov.className = 'fixed inset-0 z-[80] bg-ink text-white flex flex-col';
  ov.innerHTML = `
    <div class="px-5 flex items-center justify-between" style="padding-top:max(1.25rem,env(safe-area-inset-top))">
      <div>
        <div class="font-extrabold text-lg">Voice walkthrough</div>
        <div id="vwRoom" class="text-[12px] text-gray-400">Say or type a room, then the repairs</div>
      </div>
      <button id="vwDone" class="press bg-white text-ink font-bold px-4 py-2 rounded-full text-sm">Done</button>
    </div>
    <div class="flex-1 overflow-y-auto px-5 py-4"><div id="vwFeed" class="space-y-2"></div></div>
    <div id="vwInterim" class="px-5 text-[13px] text-gray-400 italic min-h-[1.2em] mb-1"></div>
    <div class="px-5 pb-2 flex gap-2">
      <input id="vwText" enterkeyhint="done" placeholder="Type: kitchen, new cabinets, a range…" class="flex-1 px-3 py-2.5 rounded-xl bg-white/10 text-white placeholder-gray-500 outline-none text-[14px]"/>
      <button id="vwSend" class="press bg-spark text-white px-4 rounded-xl font-bold">Add</button>
    </div>
    <div class="flex flex-col items-center pb-6" style="padding-bottom:max(1.5rem,env(safe-area-inset-bottom))">
      <div id="vwMic" class="w-14 h-14 rounded-full bg-spark flex items-center justify-center text-2xl animate-pulse">🎙️</div>
      <div id="vwStatus" class="text-[12px] text-gray-400 mt-2 px-6 text-center">Starting…</div>
      <div id="vwTotal" class="font-extrabold text-xl text-spark mt-1">${fmt(grandTotal())}</div>
    </div>`;
  document.body.appendChild(ov);

  const elFeed = ov.querySelector('#vwFeed'), elRoom = ov.querySelector('#vwRoom'),
        elTotal = ov.querySelector('#vwTotal'), elInterim = ov.querySelector('#vwInterim'),
        elStatus = ov.querySelector('#vwStatus'), elMic = ov.querySelector('#vwMic'),
        elText = ov.querySelector('#vwText'), elSend = ov.querySelector('#vwSend');
  ensureVoiceIndex(); // warm the fuzzy matcher in the background (keyword match works without it)

  const renderFeed = () => {
    elTotal.textContent = fmt(grandTotal());
    elRoom.textContent = VOICE.room ? ('Room: ' + ROOM_TYPES[VOICE.room].label) : 'Say or type a room, then the repairs';
    if (!feed.length){ elFeed.innerHTML = `<div class="text-center text-gray-500 text-[13px] py-10">Try: “kitchen, new cabinets and a range”, then “bathroom, toilet and a new vanity”.</div>`; return; }
    elFeed.innerHTML = feed.map((f,i)=> f.matched
      ? `<div class="flex items-center gap-2 bg-white/10 rounded-xl px-3 py-2">
          <div class="flex-1 min-w-0"><div class="text-[14px] font-semibold truncate">✓ ${esc(f.name)}</div>
          <div class="text-[11px] text-gray-400 truncate">${esc(f.room)} · “${esc(f.phrase)}”</div></div>
          <div class="flex items-center gap-1 flex-shrink-0">
            <button data-qd="${i}" class="press w-7 h-7 rounded-lg bg-white/15 text-lg font-bold leading-none">−</button>
            <span class="w-7 text-center text-[13px] font-bold">${f.qty}</span>
            <button data-qi="${i}" class="press w-7 h-7 rounded-lg bg-white/15 text-lg font-bold leading-none">+</button>
            <button data-undo="${i}" class="press text-[13px] text-gray-400 font-bold px-1 ml-0.5">✕</button>
          </div></div>`
      : `<div class="bg-white/5 rounded-xl px-3 py-2 text-[12px] text-gray-500">No repair matched in “${esc(f.phrase)}”. Try a clearer term.</div>`
    ).join('');
    const setQ = (i, nq) => { const f = feed[i]; if (!f || !f.matched) return; nq = Math.max(1, nq); f.qty = nq; const c = P.cells[cellKey(f.roomId, f.group, f.id)]; if (c) c.q = nq; saveSoon(); renderFeed(); };
    elFeed.querySelectorAll('[data-qi]').forEach(b => b.onclick = () => setQ(+b.dataset.qi, feed[+b.dataset.qi].qty + 1));
    elFeed.querySelectorAll('[data-qd]').forEach(b => b.onclick = () => setQ(+b.dataset.qd, feed[+b.dataset.qd].qty - 1));
    elFeed.querySelectorAll('[data-undo]').forEach(b => b.onclick = () => {
      const f = feed[+b.dataset.undo]; if (!f || !f.matched) return;
      delete P.cells[cellKey(f.roomId, f.group, f.id)]; save();
      f.matched = false; f.phrase = f.name + ' (removed)'; renderFeed();
    });
  };
  renderFeed();

  // shared by speech + the text box
  const processParts = async (raw) => {
    const rs = await processSpeech(raw);
    rs.forEach(r => feed.unshift(r));
    renderFeed();
  };
  const submitText = () => { const v = elText.value.trim(); if (!v) return; processParts(v); elText.value = ''; elText.focus(); };
  elSend.onclick = submitText;
  elText.onkeydown = (e) => { if (e.key === 'Enter'){ e.preventDefault(); submitText(); } };

  let active = false;
  if (SR){
    active = true;
    const rec = new SR(); _vrec = rec;
    rec.lang = 'en-US'; rec.continuous = true; rec.interimResults = true;
    rec.onresult = async (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++){
        const r = e.results[i];
        if (r.isFinal) await processParts(r[0].transcript);
        else interim += r[0].transcript;
      }
      elInterim.textContent = interim;
    };
    rec.onerror = (ev) => {
      const msg = (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') ? 'Microphone blocked. Allow it, or just type below.'
        : ev.error === 'network' ? 'No connection for speech. Type below instead.'
        : '';
      if (msg) elStatus.textContent = msg;
    };
    rec.onend = () => { if (active) { try { rec.start(); } catch(e){} } };
    try { rec.start(); elStatus.textContent = 'Listening… or type below'; } catch(e){ elStatus.textContent = 'Type the repairs below'; }
  } else {
    elStatus.textContent = 'Voice input not supported here — type the repairs below.';
    elMic.classList.remove('animate-pulse'); elMic.style.opacity = '0.4';
  }

  ov.querySelector('#vwDone').onclick = () => {
    active = false; if (_vrec){ try { _vrec.stop(); } catch(e){} _vrec = null; }
    const added = feed.filter(f => f.matched);
    if (added.length){ UI.tab = 'estimate'; UI.roomId = added[0].roomId; }
    ov.remove(); render();
    toast(added.length ? added.length + ' item' + (added.length!==1?'s':'') + ' added — check the estimate' : 'Voice walkthrough ended');
  };
}

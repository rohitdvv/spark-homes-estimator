    <div class="absolute bottom-0 inset-x-0 flex items-center justify-around p-6" style="padding-bottom:max(1.5rem,env(safe-area-inset-bottom))">
      <button id="liveDone" class="text-white font-semibold text-[15px] px-3 py-2">Done</button>
      <button id="liveDetect" class="text-white font-semibold text-[13px] px-3 py-2 rounded-full bg-white/15" title="AI scope detect">✨ Detect</button>
      <button id="liveSnap" class="rounded-full bg-white ring-4 ring-white/40" style="width:72px;height:72px"></button>
      <button id="liveMic" class="text-white text-2xl px-3 py-2" title="Voice note">🎙️</button>
    </div>`;
  document.body.appendChild(ov);
  try {
    _liveStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    const v = document.getElementById('liveVid');
    v.srcObject = _liveStream;
    await v.play().catch(() => {}); // iOS Safari needs an explicit play() after srcObject
  } catch (e) {
    stopLive();
    const n = e && e.name;
    const msg = n === 'NotAllowedError' || n === 'SecurityError'
        ? 'Camera blocked. Tap the lock / “aA” icon in the address bar → allow Camera, then retry. Use the https link, not an embedded preview.'
      : (n === 'NotFoundError' || n === 'DevicesNotFoundError' || n === 'OverconstrainedError')
        ? 'No usable camera found — use “Photo / upload” instead.'
      : n === 'NotReadableError'
        ? 'Camera is in use by another app. Close it and retry.'
        : 'Could not start the camera — use “Photo / upload” instead.';
    toast(msg, 6000);
    return;
  }
  let count = 0;
  document.getElementById('liveSnap').onclick = () => {
    const v = document.getElementById('liveVid');
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    compress(c.toDataURL('image/jpeg', 0.8), 1280, 0.7).then(data => {
      P.photos.push({ id: 'ph' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), data, caption: 'Live frame ' + new Date().toLocaleTimeString(), serial: '' });
      save();
      count++; const cc = document.getElementById('liveCount'); if (cc) cc.textContent = count + ' frame' + (count!==1?'s':'') + ' captured';
      const b = document.getElementById('liveSnap'); if (b) { b.style.transform = 'scale(.85)'; setTimeout(() => b.style.transform = '', 120); }
    });
  };
  document.getElementById('liveMic').onclick = () => liveVoiceNote();
  document.getElementById('liveDone').onclick = () => { stopLive(); render(); toast(count ? count + ' frames saved' : 'Capture ended'); };

  // AI scope detect: scan the current frame, suggest line items to add
  const added = new Set();
  const renderSugg = (list) => {
    const box = document.getElementById('liveSugg'); if (!box) return;
    box.innerHTML = (list || []).map(s => `
      <div class="flex items-center gap-2 bg-black/70 text-white rounded-xl px-3 py-2">
        <div class="flex-1 min-w-0">
          <div class="text-[13px] font-semibold truncate">${esc(itemById(s.item).name)}</div>
          <div class="text-[10px] text-white/60">${esc(s.prompt)} · ${Math.round(s.score*100)}% · ${esc(ROOM_TYPES[s.room].label)}</div>
        </div>
        <button data-add="${s.item}" data-room="${s.room}" data-group="${s.group}" class="press flex-shrink-0 text-[12px] font-bold ${added.has(s.item)?'bg-white/20 text-white/60':'bg-spark text-white'} px-3 py-1.5 rounded-lg">${added.has(s.item)?'Added':'Add'}</button>
      </div>`).join('');
    box.querySelectorAll('[data-add]').forEach(b => b.onclick = () => {
      if (added.has(b.dataset.add)) return;
      applyVisionSuggestion(b.dataset.add, b.dataset.room, b.dataset.group);
      added.add(b.dataset.add); renderSugg(list);
    });
  };
  const det = document.getElementById('liveDetect');
  det.onclick = async () => {
    const v = document.getElementById('liveVid'); if (!v || !v.videoWidth) return;
    det.textContent = VISION.state === 'ready' ? '✨ Scanning…' : '✨ Loading AI…';
    const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    const out = await suggestScope(c.toDataURL('image/jpeg', 0.85));
    det.textContent = '✨ Detect';
    if (out.error) { toast('Detector unavailable offline (needs first online load)', 4000); return; }
    if (!out.suggestions.length) { renderSugg([]); toast('Nothing recognized — move closer or steadier', 3500); return; }
    renderSugg(out.suggestions);
  };
}
function stopLive() {
  if (_liveStream) { _liveStream.getTracks().forEach(t => t.stop()); _liveStream = null; }
  document.getElementById('liveOverlay')?.remove();
}
/* voice note during live capture → caption the most recent frame */
function liveVoiceNote() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice not supported here'); return; }
  const rec = new SR(); rec.lang = 'en-US'; rec.interimResults = false;
  toast('Listening… describe what you see');
  rec.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const last = P.photos[P.photos.length - 1];
    if (last) { last.caption = txt; save(); toast('Note saved: ' + txt); }
    else toast('Capture a frame first, then add a note');
  };
  rec.onerror = () => toast('Could not capture audio');
  try { rec.start(); } catch { toast('Voice unavailable'); }
}

/* serial-number OCR via Tesseract (lazy-loaded) */
function loadTesseract() {
  return new Promise((res, rej) => {
    if (window.Tesseract) return res();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
}
async function runOCR(id) {
  const ph = P.photos.find(p => p.id === id); if (!ph) return;
  toast('Scanning… (first scan downloads OCR engine)');
  try {
    await loadTesseract();
    const { data } = await Tesseract.recognize(ph.data, 'eng');
    const text = (data.text || '').toUpperCase();
    // serial heuristics: labelled serial, else longest alphanumeric token
    let serial = '';
    const lbl = text.match(/(?:SERIAL|SER|S\/N|SN|MODEL|MFG)[^A-Z0-9]{0,4}([A-Z0-9][A-Z0-9\-]{4,})/);
    if (lbl) serial = lbl[1];
    else {
      const toks = text.replace(/[^A-Z0-9\s\-]/g, ' ').split(/\s+/).filter(t => t.length >= 6 && /[0-9]/.test(t) && /[A-Z]/.test(t));
      toks.sort((a, b) => b.length - a.length); serial = toks[0] || '';
    }
    ph.serial = serial || '(none found)';
    save(); render();
    toast(serial ? 'Serial: ' + serial : 'No serial detected');
  } catch (err) {
    toast('OCR unavailable offline (needs first online load)');
  }
}

/* ---------- export ZIP (Excel + photos) ---------- */
async function doExport() {
  if (UI.busy) return; UI.busy = true;
  toast('Building ZIP…');
  try {
    const wb = XLSX.utils.book_new();
    const rows = [
      ['SPARK EQUITY GROUP — REPAIR ESTIMATE'],
      ['Project', P.name],
      ['Address', P.address || '—'],
      ['Date', new Date().toLocaleString()],
      [],
      ['Room', 'Section', 'Group', 'Item', 'Qty', 'Unit', 'Unit Cost', 'Line Total']
    ];
    let grand = 0;
    P.rooms.forEach(r => {
      const t = ROOM_TYPES[r.type];
      t.groups.forEach(g => {
        groupItemIds(g).forEach(id => {
          if (!isChecked(r.id, g, id)) return;
          const it = itemById(id); const c = P.cells[cellKey(r.id, g, id)];
          const lt = lineTotal(r.id, g, id); grand += lt;
          rows.push([r.name, t.section, GROUPS[g].label, it.name, c.q, it.unit, priceOf(id), lt]);
        });
      });
    });
    rows.push([]);
    rows.push(['', '', '', '', '', '', 'GRAND TOTAL', grand]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:16},{wch:20},{wch:22},{wch:38},{wch:6},{wch:12},{wch:12},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, 'Estimate');

    // Deal analysis sheet
    const d = P.deal, arv = +d.arv||0, pur = +d.purchase||0, hold = (+d.weeks||0)*(+d.perWeek||0), sell = arv*((+d.sellPct||0)/100);
    const tc = pur+grand+hold+sell, profit = arv-tc;
    const dws = XLSX.utils.aoa_to_sheet([
      ['DEAL ANALYSIS'], [],
      ['After-Repair Value', arv], ['Purchase Price', pur], ['Repair Estimate', grand],
      ['Holding Costs', hold], ['Selling Costs', sell], ['Total Cost Basis', tc],
      ['Projected Profit', profit], ['Return on Cost', tc?(profit/tc):0],
      ['70% Rule Max Offer', arv*0.7-grand]
    ]);
    dws['!cols']=[{wch:24},{wch:16}];
    XLSX.utils.book_append_sheet(wb, dws, 'Deal Analysis');

    const xlsxBuf = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });

    const zip = new JSZip();
    const safe = P.name.replace(/[^\w\-]+/g, '_');
    zip.file(`${safe}_estimate.xlsx`, xlsxBuf);
    if (P.photos.length) {
      const pf = zip.folder('photos');
      P.photos.forEach((ph, i) => {
        const b64 = ph.data.split(',')[1];
        const nm = (ph.caption ? ph.caption.replace(/[^\w\-]+/g,'_') : `photo_${i+1}`) + (ph.serial && ph.serial!=='(none found)' ? `_SN-${ph.serial.replace(/[^\w\-]+/g,'')}` : '') + '.jpg';
        pf.file(nm, b64, { base64: true });
      });
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${safe}_${new Date().toISOString().slice(0,10)}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    toast('ZIP downloaded ✓');
  } catch (err) {
    console.error(err); toast('Export failed: ' + err.message);
  } finally { UI.busy = false; }
}

/* ---------- misc UI ---------- */
let _toastT;
function toast(msg, ms) {
  const t = document.getElementById('toast');
  t.className = 'toast fixed left-1/2 bottom-24 z-[60] bg-ink text-white text-sm font-semibold px-4 py-2.5 rounded-full shadow-lg max-w-[88%] text-center leading-snug';
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.add('hidden'), ms || 2200);
}
function confirmDel(msg, fn) {
  modal(`<div class="px-5 pb-8 pt-2 text-center">
    <div class="text-3xl mb-2">⚠️</div>
    <p class="font-semibold mb-5">${msg}</p>
    <button id="cfd" class="press w-full py-3 bg-red-500 text-white rounded-xl font-bold mb-2">Delete</button>
    <button data-act="backdrop" onclick="event.target.closest('#modal')&&(document.getElementById('modal').classList.add('hidden'),document.getElementById('modal').innerHTML='')" class="press w-full py-2.5 text-gray-500 font-semibold">Cancel</button>
  </div>`);
  document.getElementById('cfd').addEventListener('click', () => { closeModal(); fn(); });
}

/* =====================================================================
   12. BOOT + PWA
   ===================================================================== */
function boot() {
  // Imported estimate via shared link? Bring it in, then show it.
  if (/import=/.test(location.hash)) {
    P = null; render();
    handleImport().then(ok => { render(); toast(ok ? 'Estimate imported ✓' : 'Could not import that link', 3500); });
    return;
  }
  // Otherwise always land on the home screen (saved estimates listed there,
  // one tap to resume). We no longer auto-reopen the last project on launch.
  P = null;
  render();
}
boot();

if ('serviceWorker' in navigator) {
  let _refreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_refreshed) return; _refreshed = true; location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.update();
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw && nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('skipWaiting');
        });
      });
    }).catch(()=>{});
  });
}
